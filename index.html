<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable">
<title>致我们的青春</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  user-select: none;
}

/* 加载提示 */
.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 0.5s ease-out;
}
.loading-text {
  color: #fff;
  font-size: 16px;
  opacity: 0.7;
  letter-spacing: 2px;
  margin-top: 20px;
  min-height: 24px;
}
.loading-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.5); opacity: 1; }
}
.loading.hidden {
  opacity: 0;
  pointer-events: none;
}

.head-text {
  position: fixed;
  top: 5vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  z-index: 99;
  pointer-events: none;
}
.main-title {
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 3px;
  opacity: 0.92;
}
.sub-title {
  font-size: 14px;
  margin-top: 8px;
  opacity: 0.6;
  font-weight: 200;
  letter-spacing: 1px;
}

.slider {
  width: 100vw;
  height: 100vh;
  position: relative;
}
.photo {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  transition: opacity 0.6s ease-out;
  will-change: opacity;
}
.photo.active {
  opacity: 1;
}

/* 播放状态实时显示 */
.play-status {
  position: fixed;
  bottom: 10vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 12px;
  opacity: 0.5;
  z-index: 90;
  pointer-events: none;
  letter-spacing: 1px;
}

.controls {
  position: fixed;
  bottom: 4vh;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 100;
}
.btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #fff;
  font-size: 16px;
  display: grid;
  place-items: center;
  backdrop-filter: blur(6px);
  transition: all 0.2s;
}
.btn:active {
  background: rgba(255,255,255,0.2);
}

.petal {
  position: fixed;
  top: -10%;
  z-index: 50;
  border-radius: 50% 0 50% 50%;
  background: linear-gradient(135deg, #f6d6e4, #ffe0f0);
  opacity: 0.35;
  pointer-events: none;
  animation: fall linear infinite;
}
@keyframes fall {
  100% { transform: translateY(110vh) rotate(360deg); }
}
</style>
</head>

<body>
<!-- 加载提示 -->
<div class="loading" id="loading">
  <div class="loading-dot"></div>
  <div class="loading-text" id="loadingText">正在加载...</div>
</div>

<div class="head-text">
  <div class="main-title">致我们的青春</div>
  <div class="sub-title">智能装备2201</div>
</div>

<div class="slider" id="slider">
  <div class="photo active" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.1.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.2.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.3.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.4.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p1.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p2.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p3.5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p4.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p4.5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p6.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p7.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p8.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p9.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p10.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p11.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p12.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p16.5.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p19.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p20.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p21.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p24.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p24.5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p25.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p26.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p27.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p28.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p28.5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p29.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p30.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p31.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p32.webp)"></div>
</div>

<!-- 播放状态实时显示 -->
<div class="play-status" id="playStatus">点击页面播放音乐</div>

<div class="controls">
  <button class="btn" id="musicBtn">🔇</button>
  <button class="btn" id="prev">◀</button>
  <button class="btn" id="nextSong">🔀</button>
  <button class="btn" id="next">▶</button>
</div>

<!-- 音频 -->
<audio id="bgm1" loop preload="auto" muted>
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/Chinesesong.m4a" type="audio/mp4">

<audio id="bgm2" loop preload="none" muted>
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/seeyouagain.m4a" type="audio/mp4">


<script>
const photos = document.querySelectorAll('.photo');
const bgm1 = document.getElementById('bgm1');
const bgm2 = document.getElementById('bgm2');
const musicBtn = document.getElementById('musicBtn');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const nextSongBtn = document.getElementById('nextSong');
const loading = document.getElementById('loading');
const loadingText = document.getElementById('loadingText');
const playStatus = document.getElementById('playStatus');

const songNames = {
  bgm1: "凤凰花开的路口",
  bgm2: "See You Again"
};
const AUTO_SLIDE_INTERVAL = 4500;

let index = 0;
let timer = null;
let isMute = true;
let currentAudio = bgm1;
let secondSongLoaded = false;
let userInteracted = false;

// 更新底部播放状态
function updatePlayStatus() {
  if (!userInteracted) {
    playStatus.innerText = "点击页面播放音乐";
    return;
  }
  playStatus.innerText = isMute ? "🔇 静音" : `播放 ${songNames[currentAudio.id]}`;
}

// 加载第一张图片
function preloadFirstImage() {
  return new Promise(resolve => {
    loadingText.innerText = "加载照片中...";
    const img = new Image();
    img.src = photos[0].style.backgroundImage.replace(/url\(["']?(.*?)["']?\)/, '$1');
    img.onload = img.onerror = resolve;
    setTimeout(resolve, 1500);
  });
}

// 核心：等待第一首音频完全加载就绪
function preloadMainAudio() {
  return new Promise(resolve => {
    loadingText.innerText = "加载背景音乐中...";
    let done = false;

    function finishLoad() {
      if (done) return;
      done = true;
      loadingText.innerText = "全部加载完成";
      resolve();
    }

    // 音频可流畅播放
    bgm1.oncanplaythrough = finishLoad;
    // 加载失败兜底
    bgm1.onerror = finishLoad;
    // 最长等待5秒，防止卡死
    setTimeout(finishLoad, 10000);
  });
}

// 音频播放统一处理
function playAudio() {
  if (!userInteracted) return;
  currentAudio.muted = isMute;
  if (!isMute) {
    currentAudio.play().catch(() => {
      isMute = true;
      musicBtn.innerText = "🔇";
      updatePlayStatus();
    });
  } else {
    currentAudio.pause();
  }
  updatePlayStatus();
}

// 轮播切换图片 + 预加载下一张
function slide() {
  photos[index].classList.remove('active');
  index = (index + 1) % photos.length;
  photos[index].classList.add('active');

  const nextIndex = (index + 1) % photos.length;
  const tempImg = new Image();
  tempImg.src = photos[nextIndex].style.backgroundImage.replace(/url\(["']?(.*?)["']?\)/, '$1');
}

function startAutoSlide() {
  if (timer) clearInterval(timer);
  timer = setInterval(slide, AUTO_SLIDE_INTERVAL);
}

// 初始化：图片 + 音频 全部加载完毕，再开启轮播
async function init() {
  await preloadFirstImage();
  await preloadMainAudio();

  // 关闭加载遮罩，正式进入页面并启动轮播
  loading.classList.add('hidden');
  startAutoSlide();
  updatePlayStatus();

  // 全局点击触发播放（兼容浏览器自动播放策略）
  const pageClick = () => {
    if (!userInteracted) {
      userInteracted = true;
      isMute = false;
      musicBtn.innerText = "🔊";
      playAudio();
      document.removeEventListener('click', pageClick);
    }
  };
  document.addEventListener('click', pageClick);
}

// 上一张按钮
prevBtn.onclick = e => {
  e.stopPropagation();
  photos[index].classList.remove('active');
  index = (index - 1 + photos.length) % photos.length;
  photos[index].classList.add('active');

  const nextIndex = (index + 1) % photos.length;
  const tempImg = new Image();
  tempImg.src = photos[nextIndex].style.backgroundImage.replace(/url\(["']?(.*?)["']?\)/, '$1');
  startAutoSlide();
};

// 下一张按钮
nextBtn.onclick = e => {
  e.stopPropagation();
  slide();
  startAutoSlide();
};

// 静音/播放按钮
musicBtn.onclick = e => {
  e.stopPropagation();
  isMute = !isMute;
  musicBtn.innerText = isMute ? "🔇" : "🔊";
  playAudio();
};

// 切歌按钮
nextSongBtn.onclick = e => {
  e.stopPropagation();
  currentAudio.pause();
  currentAudio.currentTime = 0;
  currentAudio = currentAudio === bgm1 ? bgm2 : bgm1;

  if (currentAudio === bgm2 && !secondSongLoaded) {
    bgm2.load();
    secondSongLoaded = true;
  }
  currentAudio.muted = isMute;
  playAudio();
};

// 花瓣动画
setTimeout(() => {
  function petal() {
    const p = document.createElement('div');
    p.classList.add('petal');
    const s = Math.random() * 6 + 4;
    p.style.width = s + 'px';
    p.style.height = s * 0.8 + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = Math.random() * 7 + 6 + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 13000);
  }
  setInterval(petal, 1200);
}, 1000);

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
