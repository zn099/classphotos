<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 移动端核心适配：禁止缩放、优化视口、微信兼容 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<!-- 微信X5内核优化 -->
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="renderer" content="webkit">
<!-- CDN预连接，提前建立链接 -->
<link rel="preconnect" href="cdn.jsdelivr.net" crossorigin>
<meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable">
<title>致我们的青春</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  user-select: none;
  /* 移动端防闪烁 */
  -webkit-font-smoothing: antialiased;
  -webkit-backface-visibility: hidden;
}

/* 加载页 */
.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 0.3s ease-out;
}
.loading-text {
  color: #fff;
  font-size: 16px;
  opacity: 0.7;
  letter-spacing: 2px;
  margin-top: 20px;
}
.loading-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.5); opacity: 1; }
}
.loading.hidden {
  opacity: 0;
  pointer-events: none;
}

.head-text {
  position: fixed;
  top: 5vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  z-index: 99;
  pointer-events: none;
}
.main-title {
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 3px;
  opacity: 0.92;
}
.sub-title {
  font-size: 14px;
  margin-top: 8px;
  opacity: 0.6;
  font-weight: 200;
  letter-spacing: 1px;
}

.slider {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}
/* 改用img标签，修复手机黑屏、渲染问题 */
.photo {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 0.4s ease-out;
  /* 移动端硬件加速，防黑屏 */
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
}
.photo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}
.photo.active {
  opacity: 1;
}

.play-status {
  position: fixed;
  bottom: 10vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 12px;
  opacity: 0.5;
  z-index: 90;
  pointer-events: none;
  letter-spacing: 1px;
}

.controls {
  position: fixed;
  bottom: 4vh;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 100;
}
.btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #fff;
  font-size: 16px;
  display: grid;
  place-items: center;
  backdrop-filter: blur(6px);
  transition: all 0.2s;
}
.btn:active {
  background: rgba(255,255,255,0.2);
}

.petal {
  position: fixed;
  top: -10%;
  z-index: 50;
  border-radius: 50% 0 50% 50%;
  background: linear-gradient(135deg, #f6d6e4, #ffe0f0);
  opacity: 0.35;
  pointer-events: none;
  animation: fall linear infinite;
}
@keyframes fall {
  100% { transform: translateY(110vh) rotate(360deg); }
}
</style>
</head>

<body>
<div class="loading" id="loading">
  <div class="loading-dot"></div>
  <div class="loading-text">回忆加载中</div>
</div>

<div class="head-text">
  <div class="main-title">致我们的青春</div>
  <div class="sub-title">智能装备2201</div>
</div>

<div class="slider" id="slider">
  <div class="photo active"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.1.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.2.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.3.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.4.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.5.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p1.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p2.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p3.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p3.5.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p4.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p4.5.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p5.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p6.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p7.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p8.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p9.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p10.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p11.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p12.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p12.4.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p12.8.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p13.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p14.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p15.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p16.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p16.5.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p17.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p18.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p19.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p20.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p21.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p22.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p23.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p24.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p24.5.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p25.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p26.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p27.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p28.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p28.5.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p29.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p30.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p31.webp" alt=""></div>
  <div class="photo"><img src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p32.webp" alt=""></div>
</div>

<div class="play-status" id="playStatus">点击页面播放音乐</div>

<div class="controls">
  <button class="btn" id="musicBtn">🔇</button>
  <button class="btn" id="prev">◀</button>
  <button class="btn" id="nextSong">🔀</button>
  <button class="btn" id="next">▶</button>
</div>

<!-- 移动端音频优化：preload=none 减少初始流量，微信兼容优先 -->
<audio id="bgm1" loop preload="none">
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/Chinesesong.m4a" type="audio/mpeg">

<audio id="bgm2" loop preload="none">
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/seeyouagain.m4a" type="audio/mpeg">


<script>
const photos = document.querySelectorAll('.photo');
const imgs = document.querySelectorAll('.photo img');
const bgm1 = document.getElementById('bgm1');
const bgm2 = document.getElementById('bgm2');
const musicBtn = document.getElementById('musicBtn');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const nextSongBtn = document.getElementById('nextSong');
const loading = document.getElementById('loading');
const playStatus = document.getElementById('playStatus');

const songNames = { bgm1: "凤凰花开的路口", bgm2: "See You Again" };
const AUTO_SLIDE_INTERVAL = 4500;

let index = 0;
let timer = null;
let isMute = true;
let currentAudio = bgm1;
let userInteracted = false;
const loadedImages = new Set();
let isSliding = false;

// 更新状态栏
function updateStatus() {
  if (!userInteracted) {
    playStatus.textContent = '点击页面播放音乐';
    return;
  }
  playStatus.textContent = isMute ? '🔇 静音' : `正在播放 ${songNames[currentAudio.id]}`;
}

// 图片加载：单请求+超时，适配手机低并发
function loadImage(imgEl, timeout = 2500) {
  const url = imgEl.src;
  if (loadedImages.has(url)) return Promise.resolve();
  return new Promise(resolve => {
    let timer = setTimeout(resolve, timeout);
    imgEl.onload = () => {
      clearTimeout(timer);
      loadedImages.add(url);
      resolve();
    };
    imgEl.onerror = () => {
      clearTimeout(timer);
      resolve();
    };
    // 触发加载
    imgEl.src = url;
  });
}

// 音频播放：微信专属兼容
function playAudio() {
  if (!userInteracted) return;
  currentAudio.muted = isMute;
  if (!isMute) {
    // 微信内核兜底重试
    currentAudio.play().catch(() => {
      currentAudio.load();
      currentAudio.play().catch(() => {
        isMute = true;
        musicBtn.textContent = '🔇';
      });
    });
  } else {
    currentAudio.pause();
  }
  updateStatus();
}

// 轮播：仅预载下一张，严格控制并发
async function slide() {
  if (isSliding) return;
  isSliding = true;

  const nextIdx = (index + 1) % photos.length;
  await loadImage(imgs[nextIdx]);

  photos[index].classList.remove('active');
  index = nextIdx;
  photos[index].classList.add('active');

  // 仅延迟预载下一张，不批量加载
  setTimeout(() => {
    const preIdx = (index + 1) % photos.length;
    loadImage(imgs[preIdx]);
  }, 800);

  isSliding = false;
}

function startSlide() {
  clearInterval(timer);
  timer = setInterval(slide, AUTO_SLIDE_INTERVAL);
}

// 初始化：极速进入，只加载首图
async function init() {
  await loadImage(imgs[0]);
  // 缩短加载页时长，弱网快速进入
  setTimeout(() => {
    loading.classList.add('hidden');
    startSlide();
    updateStatus();
  }, 800);
}

// 全局点击解锁音频（微信必须真实用户交互）
document.addEventListener('click', () => {
  if (!userInteracted) {
    userInteracted = true;
    isMute = false;
    musicBtn.textContent = '🔊';
    playAudio();
  }
}, { once: true });

// 上一张
prevBtn.onclick = async (e) => {
  e.stopPropagation();
  if (isSliding) return;
  isSliding = true;

  const prevIdx = (index - 1 + photos.length) % photos.length;
  await loadImage(imgs[prevIdx]);

  photos[index].classList.remove('active');
  index = prevIdx;
  photos[index].classList.add('active');
  isSliding = false;
  startSlide();
};

// 下一张
nextBtn.onclick = (e) => {
  e.stopPropagation();
  slide();
  startSlide();
};

// 静音切换
musicBtn.onclick = (e) => {
  e.stopPropagation();
  isMute = !isMute;
  musicBtn.textContent = isMute ? '🔇' : '🔊';
  playAudio();
};

// 切换歌曲
nextSongBtn.onclick = (e) => {
  e.stopPropagation();
  currentAudio.pause();
  currentAudio.currentTime = 0;
  currentAudio = currentAudio === bgm1 ? bgm2 : bgm1;
  playAudio();
};

// 花瓣动画
setTimeout(() => {
  setInterval(() => {
    const p = document.createElement('div');
    p.className = 'petal';
    const s = Math.random() * 6 + 4;
    p.style.cssText = `width:${s}px;height:${s*0.8}px;left:${Math.random()*100}%;animation-duration:${Math.random()*7+6}s`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 13000);
  }, 1200);
}, 1000);

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
