<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="renderer" content="webkit">
<link rel="preconnect" href="cdn.jsdelivr.net" crossorigin>
<meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable">
<title>致我们的青春 · 智能装备2201</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

/* 加载页 */
.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 0.4s ease-out;
  backdrop-filter: blur(2px);
}
.loading-text {
  color: #fff;
  font-size: 16px;
  opacity: 0.7;
  letter-spacing: 2px;
  margin-top: 20px;
}
.loading-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  animation: pulse 1.2s ease-in-out infinite;
}
.loading-progress {
  width: 120px;
  height: 2px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  margin-top: 24px;
  overflow: hidden;
}
.loading-progress-bar {
  width: 0%;
  height: 100%;
  background: #fff;
  transition: width 0.2s ease;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.5); opacity: 1; }
}
.loading.hidden {
  opacity: 0;
  pointer-events: none;
}

/* 顶部文字 */
.head-text {
  position: fixed;
  top: 5vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  z-index: 99;
  pointer-events: none;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.main-title {
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 3px;
  opacity: 0.95;
}
.sub-title {
  font-size: 14px;
  margin-top: 8px;
  opacity: 0.7;
  font-weight: 200;
  letter-spacing: 1px;
}

/* 单图片容器 + 加载指示器 */
.slider {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
  background: #0a0a0a;
}
.slider-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  transition: opacity 0.35s ease-out;
  will-change: opacity;
}
.img-loader {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 36px;
  height: 36px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top: 2px solid #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  z-index: 20;
}
@keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
.img-loader.show {
  opacity: 1;
}

/* 状态文字 */
.play-status {
  position: fixed;
  bottom: 10vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 12px;
  opacity: 0.55;
  z-index: 90;
  pointer-events: none;
  letter-spacing: 1px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  width: fit-content;
  margin: 0 auto;
  left: 50%;
  transform: translateX(-50%);
  padding: 6px 14px;
  border-radius: 40px;
  white-space: nowrap;
  bottom: 11vh;
}

/* 按钮区域 */
.controls {
  position: fixed;
  bottom: 4vh;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 100;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(12px);
  padding: 6px 14px;
  border-radius: 60px;
}
.btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: none;
  color: #fff;
  font-size: 18px;
  display: grid;
  place-items: center;
  backdrop-filter: blur(4px);
  transition: all 0.2s cubic-bezier(0.2,0.9,0.4,1.1);
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.btn:active {
  background: rgba(255,255,255,0.28);
  transform: scale(0.94);
}

/* 花瓣动画优化性能 */
.petal {
  position: fixed;
  top: -10%;
  z-index: 50;
  border-radius: 50% 0 50% 50%;
  background: linear-gradient(135deg, #f6d6e4, #ffe0f0);
  opacity: 0.3;
  pointer-events: none;
  will-change: transform;
  animation: fall linear infinite;
}
@keyframes fall {
  100% { transform: translateY(110vh) rotate(360deg); }
}

/* 加载失败小提示 */
.err-tip {
  position: fixed;
  bottom: 20vh;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  color: #ffb347;
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 20px;
  backdrop-filter: blur(8px);
  z-index: 95;
  pointer-events: none;
  transition: opacity 0.3s;
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-dot"></div>
  <div class="loading-text">青春影像加载中</div>
  <div class="loading-progress"><div class="loading-progress-bar" id="loadProgressBar"></div></div>
</div>

<div class="head-text">
  <div class="main-title">致我们的青春</div>
  <div class="sub-title">智能装备2201</div>
</div>

<div class="slider">
  <div class="img-loader" id="imgLoader"></div>
  <img class="slider-img" id="mainImg" src="" alt="青春回忆">
</div>

<div class="play-status" id="playStatus">🎵 点击页面播放音乐</div>
<div class="err-tip" id="errTip" style="opacity:0;">⚠️ 图片加载失败，已自动重试</div>

<div class="controls">
  <button class="btn" id="musicBtn">🔇</button>
  <button class="btn" id="prev">◀</button>
  <button class="btn" id="nextSong">🔀</button>
  <button class="btn" id="next">▶</button>
</div>

<audio id="bgm1" loop preload="metadata" crossorigin="anonymous">
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/Chinesesong.mp3" type="audio/mpeg">
</audio>
<audio id="bgm2" loop preload="metadata" crossorigin="anonymous">
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/seeyouagain.mp3" type="audio/mpeg">
</audio>

<script>
// ---------- 图片列表 ----------
const imgList = [
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.1.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.2.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.3.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.4.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.5.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p1.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p2.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p3.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p3.5.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p4.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p4.5.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p5.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p6.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p7.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p8.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p9.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p10.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p11.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p12.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p12.4.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p12.8.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p13.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p14.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p15.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p16.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p16.5.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p17.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p18.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p19.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p20.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p21.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p22.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p23.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p24.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p24.5.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p25.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p26.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p27.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p28.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p28.5.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p29.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p30.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p31.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p32.webp"
];

// ---------- DOM 元素 ----------
const mainImg = document.getElementById('mainImg');
const bgm1 = document.getElementById('bgm1');
const bgm2 = document.getElementById('bgm2');
const musicBtn = document.getElementById('musicBtn');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const nextSongBtn = document.getElementById('nextSong');
const loadingDiv = document.getElementById('loading');
const playStatusSpan = document.getElementById('playStatus');
const imgLoaderIcon = document.getElementById('imgLoader');
const errTipDiv = document.getElementById('errTip');
const progressBar = document.getElementById('loadProgressBar');

const songNames = { bgm1: "凤凰花开的路口", bgm2: "See You Again" };
const AUTO_SLIDE_INTERVAL = 5000;   // 5秒自动切换，体验更从容

// 全局状态
let currentIndex = 0;
let slideTimer = null;
let isMuted = true;
let currentAudio = bgm1;
let userInteracted = false;
let isImgLoading = false;

// ---------- 增强预加载 & 重试机制 ----------
const imgCacheSet = new Set();        // 已成功加载过的url
const pendingLoadMap = new Map();     // 正在加载的promise去重
let totalImages = imgList.length;
let loadedCount = 0;

// 更新加载进度 (仅初始预加载用)
function updateProgress() {
  if (!progressBar) return;
  let percent = (loadedCount / totalImages) * 100;
  progressBar.style.width = Math.min(percent, 100) + '%';
  if (loadedCount >= totalImages) {
    // 预加载完成可隐藏进度，但仍保留loading显示一会后淡出
    setTimeout(() => {
      if (loadingDiv && !loadingDiv.classList.contains('hidden')) {
        loadingDiv.classList.add('hidden');
      }
    }, 400);
  }
}

// 显示短暂错误提示（自动淡出）
let errTimeout = null;
function showErrMsg(msg) {
  if (errTipDiv) {
    errTipDiv.textContent = msg || '⚠️ 图片加载失败，自动重试中';
    errTipDiv.style.opacity = '1';
    if (errTimeout) clearTimeout(errTimeout);
    errTimeout = setTimeout(() => {
      if (errTipDiv) errTipDiv.style.opacity = '0';
    }, 2000);
  }
}

// 带重试的图片预加载函数 (最多重试2次，每次等待递增)
function preloadImageWithRetry(url, retries = 2, delay = 300) {
  return new Promise((resolve) => {
    // 如果已经成功缓存过，直接resolved
    if (imgCacheSet.has(url)) {
      resolve(true);
      return;
    }
    // 避免重复并发加载同一张图片
    if (pendingLoadMap.has(url)) {
      pendingLoadMap.get(url).then(resolve);
      return;
    }
    const loadPromise = new Promise(async (res) => {
      let attempt = 0;
      const tryLoad = () => {
        const img = new Image();
        img.referrerPolicy = "no-referrer";
        let timeoutId = setTimeout(() => {
          img.src = '';
          if (attempt < retries) {
            attempt++;
            setTimeout(tryLoad, delay * (attempt + 0.5));
          } else {
            pendingLoadMap.delete(url);
            res(false);  // 超时失败
          }
        }, 3500); // 超时3.5s
        img.onload = () => {
          clearTimeout(timeoutId);
          imgCacheSet.add(url);
          pendingLoadMap.delete(url);
          // 计数预加载进度
          if (!imgCacheSet.has(url) && loadedCount < totalImages) {
            loadedCount++;
            updateProgress();
          } else if (!imgCacheSet.has(url)) {
            loadedCount++;
            updateProgress();
          }
          imgCacheSet.add(url);
          res(true);
        };
        img.onerror = () => {
          clearTimeout(timeoutId);
          if (attempt < retries) {
            attempt++;
            setTimeout(tryLoad, delay * (attempt + 0.5));
          } else {
            pendingLoadMap.delete(url);
            res(false);
          }
        };
        img.src = url;
      };
      tryLoad();
    });
    pendingLoadMap.set(url, loadPromise);
    loadPromise.then(resolve);
  });
}

// 后台智能预加载所有图片 (限制并发数4，避免过多请求造成阻塞)
async function preloadAllImages() {
  const queue = [...imgList];
  const concurrency = 5;
  let active = 0;
  let indexQueue = 0;
  return new Promise((resolve) => {
    const next = async () => {
      if (indexQueue >= queue.length && active === 0) {
        resolve();
        return;
      }
      if (indexQueue >= queue.length) return;
      const url = queue[indexQueue++];
      active++;
      // 静默预加载，不阻塞主流程
      preloadImageWithRetry(url, 2, 400).finally(() => {
        active--;
        next();
      });
      if (active < concurrency) next();
    };
    for (let i = 0; i < concurrency; i++) next();
  });
}

// 单独确保当前图片高优加载 (切换时使用)
async function ensureImageLoaded(url, showSpinner = true) {
  if (imgCacheSet.has(url)) return true;
  if (showSpinner) {
    imgLoaderIcon.classList.add('show');
  }
  const success = await preloadImageWithRetry(url, 2, 300);
  if (showSpinner) {
    imgLoaderIcon.classList.remove('show');
  }
  if (!success) {
    showErrMsg('📸 图片加载失败，可左右切换重试');
    return false;
  }
  return true;
}

// 切换图片核心 (优化过渡 + 错误后备)
async function switchToImage(newIndex, manual = false) {
  if (isImgLoading) return;
  const targetUrl = imgList[newIndex];
  if (!targetUrl) return;
  
  // 显示加载中(如果图片还未缓存)
  const needWait = !imgCacheSet.has(targetUrl);
  if (needWait) {
    imgLoaderIcon.classList.add('show');
    isImgLoading = true;
  }
  
  const loadOk = await ensureImageLoaded(targetUrl, false);
  if (needWait) {
    imgLoaderIcon.classList.remove('show');
    isImgLoading = false;
  }
  
  // 切换图片显示
  mainImg.style.opacity = '0';
  setTimeout(() => {
    mainImg.src = targetUrl;
    // 如果加载失败，依旧设置src (会显示破碎图，但背景黑色不至于太难看)
    if (!loadOk) {
      // 额外增加onerror再次尝试单次补救
      if (mainImg.src !== targetUrl) mainImg.src = targetUrl;
    }
    mainImg.style.opacity = '1';
  }, 130);
  
  // 主动预加载相邻图片 (前后各2张，提高滑动流畅性)
  const preloadNeighbors = (idx) => {
    const neighbors = [
      imgList[(idx + 1) % imgList.length],
      imgList[(idx + 2) % imgList.length],
      imgList[(idx - 1 + imgList.length) % imgList.length],
      imgList[(idx - 2 + imgList.length) % imgList.length]
    ];
    neighbors.forEach(url => {
      if (!imgCacheSet.has(url)) preloadImageWithRetry(url, 1, 500);
    });
  };
  preloadNeighbors(newIndex);
  
  currentIndex = newIndex;
}

// 下一张
async function nextImage() {
  if (isImgLoading) return;
  const newIdx = (currentIndex + 1) % imgList.length;
  await switchToImage(newIdx);
  resetAutoTimer();
}

// 上一张
async function prevImage() {
  if (isImgLoading) return;
  const newIdx = (currentIndex - 1 + imgList.length) % imgList.length;
  await switchToImage(newIdx);
  resetAutoTimer();
}

// 重置自动轮播
function resetAutoTimer() {
  if (slideTimer) clearInterval(slideTimer);
  slideTimer = setInterval(() => {
    nextImage();
  }, AUTO_SLIDE_INTERVAL);
}

// ---------- 音频控制 ----------
function updatePlayStatusText() {
  if (!userInteracted) {
    playStatusSpan.textContent = '🎵 点击页面播放音乐';
    return;
  }
  if (isMuted) {
    playStatusSpan.textContent = '🔇 音乐已静音';
  } else {
    playStatusSpan.textContent = `🎶 正在播放 · ${songNames[currentAudio.id]}`;
  }
}

function playAudioWithRetry() {
  if (!userInteracted) return;
  currentAudio.muted = isMuted;
  if (!isMuted) {
    currentAudio.play().catch(e => {
      // 自动播放被阻止时再次尝试
      currentAudio.load();
      currentAudio.play().catch(() => {
        isMuted = true;
        musicBtn.textContent = '🔇';
        updatePlayStatusText();
      });
    });
  } else {
    currentAudio.pause();
  }
  updatePlayStatusText();
}

function unlockAudioAndPlay() {
  if (userInteracted) return;
  userInteracted = true;
  isMuted = false;
  musicBtn.textContent = '🔊';
  playAudioWithRetry();
  updatePlayStatusText();
}

// 切换歌曲
function switchSong() {
  if (!userInteracted) {
    unlockAudioAndPlay();
    return;
  }
  currentAudio.pause();
  currentAudio.currentTime = 0;
  currentAudio = currentAudio === bgm1 ? bgm2 : bgm1;
  if (!isMuted) {
    playAudioWithRetry();
  }
  updatePlayStatusText();
}

function toggleMute() {
  if (!userInteracted) {
    unlockAudioAndPlay();
    return;
  }
  isMuted = !isMuted;
  musicBtn.textContent = isMuted ? '🔇' : '🔊';
  playAudioWithRetry();
}

// 监听图片本身加载错误，做最后补救 (onerror fallback)
mainImg.onerror = async () => {
  const currentUrl = imgList[currentIndex];
  showErrMsg('🔄 图片加载异常，重新尝试');
  const retrySuccess = await preloadImageWithRetry(currentUrl, 2, 500);
  if (retrySuccess) {
    mainImg.src = currentUrl;
  } else {
    // 极少数无法加载则用黑色背景占位，但不影响浏览
    showErrMsg('⚠️ 图片暂时无法显示，可尝试下一张');
  }
};

// 页面整体交互启动
async function init() {
  // 显示loading, 优先预加载当前第一张 + 后台预加载全部队列
  const firstImg = imgList[0];
  await preloadImageWithRetry(firstImg, 2, 200);
  mainImg.src = firstImg;
  imgCacheSet.add(firstImg);
  loadedCount++;
  updateProgress();
  
  // 开启后台预加载全部 (不阻塞主界面)
  preloadAllImages().then(() => {
    // 全部预加载完成主动更新状态
    if (loadedCount < totalImages) loadedCount = totalImages;
    updateProgress();
  });
  
  // 邻域预加载第二张和最后一张提高体验
  setTimeout(() => {
    preloadImageWithRetry(imgList[1 % imgList.length], 1, 100);
    preloadImageWithRetry(imgList[imgList.length-1], 1, 100);
  }, 300);
  
  // 3秒后如果加载未消失保证隐藏，避免卡加载页
  setTimeout(() => {
    if (loadingDiv && !loadingDiv.classList.contains('hidden')) {
      loadingDiv.classList.add('hidden');
    }
  }, 2800);
  
  // 启动自动轮播
  resetAutoTimer();
  updatePlayStatusText();
  
  // 静音状态等待用户交互
  currentAudio.muted = true;
  currentAudio.pause();
}

// 绑定全局触摸/点击解锁音频（微信/移动端兼容）
document.addEventListener('touchstart', unlockAudioAndPlay, { once: true });
document.addEventListener('click', unlockAudioAndPlay, { once: true });

// 按钮事件
prevBtn.onclick = async (e) => {
  e.stopPropagation();
  await prevImage();
};
nextBtn.onclick = async (e) => {
  e.stopPropagation();
  await nextImage();
};
musicBtn.onclick = (e) => {
  e.stopPropagation();
  toggleMute();
};
nextSongBtn.onclick = (e) => {
  e.stopPropagation();
  switchSong();
};

// 为了更好的移动端滑动惯性: 添加触摸滑动支持 (可选，提升交互)
let touchStartX = 0;
let touchEndX = 0;
document.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].screenX;
}, { passive: true });
document.addEventListener('touchend', async (e) => {
  if (!userInteracted) unlockAudioAndPlay();
  touchEndX = e.changedTouches[0].screenX;
  const diff = touchEndX - touchStartX;
  if (Math.abs(diff) > 50) {
    e.preventDefault();
    if (diff > 0) {
      await prevImage();
    } else {
      await nextImage();
    }
    resetAutoTimer();
  }
}, { passive: false });

// 花瓣动画优化 (降低高刷负载)
let petalInterval = null;
setTimeout(() => {
  if (petalInterval) clearInterval(petalInterval);
  petalInterval = setInterval(() => {
    const petal = document.createElement('div');
    petal.className = 'petal';
    const size = Math.random() * 7 + 5;
    const leftPos = Math.random() * 100;
    const duration = Math.random() * 8 + 5;
    petal.style.cssText = `width:${size}px;height:${size*0.8}px;left:${leftPos}%;animation-duration:${duration}s;opacity:${Math.random() * 0.3 + 0.2};`;
    document.body.appendChild(petal);
    setTimeout(() => petal.remove(), duration * 1000 + 500);
  }, 1300);
}, 800);

// 开始执行初始化
init();
</script>
</body>
</html>
