<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<title>致我们的青春</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  user-select: none;
}

.head-text {
  position: fixed;
  top: 5vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  z-index: 99;
  pointer-events: none;
}
.main-title {
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 3px;
  opacity: 0.92;
}
.sub-title {
  font-size: 14px;
  margin-top: 8px;
  opacity: 0.6;
  font-weight: 200;
  letter-spacing: 1px;
}

.slider {
  width: 100vw;
  height: 100vh;
  position: relative;
}
.photo {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  transition: opacity 0.6s ease-out;
  will-change: opacity;
}
.photo.active {
  opacity: 1;
}

.tip {
  position: fixed;
  bottom: 7vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 12px;
  opacity: 0.4;
  z-index: 90;
  pointer-events: none;
  letter-spacing: 1px;
}

.controls {
  position: fixed;
  bottom: 4vh;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 100;
}
.btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #fff;
  font-size: 16px;
  display: grid;
  place-items: center;
  backdrop-filter: blur(6px);
  transition: all 0.2s;
}
.btn:active {
  background: rgba(255,255,255,0.2);
}

.petal {
  position: fixed;
  top: -10%;
  z-index: 50;
  border-radius: 50% 0 50% 50%;
  background: linear-gradient(135deg, #f6d6e4, #ffe0f0);
  opacity: 0.35;
  pointer-events: none;
  animation: fall linear infinite;
}
@keyframes fall {
  100% { transform: translateY(110vh) rotate(360deg); }
}
</style>
</head>

<body>

<div class="controls">
  <button class="btn" id="musicBtn">🔊</button>
  <button class="btn" id="prev">◀</button>
  <button class="btn" id="next">▶</button>
</div>

<!-- AAC(m4a) 音频格式 加载更快 -->
<audio id="bgm" loop autoplay preload="auto">
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/Chinesesong.m4a" type="audio/mp4">
</audio>

<script>
const photos = document.querySelectorAll('.photo');
const slider = document.getElementById('slider');
const bgm = document.getElementById('bgm');
const musicBtn = document.getElementById('musicBtn');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');

let index = 0;

// 自动轮播
function slide() {
  photos[index].classList.remove('active');
  index = (index + 1) % photos.length;
  photos[index].classList.add('active');
}
let timer = setInterval(slide, 4500);

// 上一张
prevBtn.onclick = () => {
  clearInterval(timer);
  photos[index].classList.remove('active');
  index = (index - 1 + photos.length) % photos.length;
  photos[index].classList.add('active');
  timer = setInterval(slide, 4500);
};

// 下一张
nextBtn.onclick = () => {
  clearInterval(timer);
  slide();
  timer = setInterval(slide, 4500);
};

// 音乐：默认播放，点击静音/取消静音
let isMute = false;
musicBtn.onclick = () => {
  isMute = !isMute;
  bgm.muted = isMute;
  musicBtn.innerText = isMute ? "🔇" : "🔊";
};

// 滑动切图
let startX = 0;
slider.addEventListener('touchstart', e => startX = e.touches[0].clientX);
slider.addEventListener('touchend', e => {
  const diff = startX - e.changedTouches[0].clientX;
  clearInterval(timer);
  if (diff > 50) nextBtn.onclick();
  if (diff < -50) prevBtn.onclick();
});

// 花瓣动画
function petal() {
  const p = document.createElement('div');
  p.classList.add('petal');
  const s = Math.random() * 6 + 4;
  p.style.width = s + 'px';
  p.style.height = s * 0.8 + 'px';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = Math.random() * 7 + 6 + 's';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 13000);
}
setInterval(petal, 900);
</script>
