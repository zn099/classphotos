<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable">
<title>致我们的青春</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  user-select: none;
}

/* 加载提示 */
.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 0.5s ease-out;
}
.loading-text {
  color: #fff;
  font-size: 16px;
  opacity: 0.7;
  letter-spacing: 2px;
  margin-top: 20px;
  min-height: 24px;
}
.loading-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.5); opacity: 1; }
}
.loading.hidden {
  opacity: 0;
  pointer-events: none;
}

.head-text {
  position: fixed;
  top: 5vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  z-index: 99;
  pointer-events: none;
}
.main-title {
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 3px;
  opacity: 0.92;
}
.sub-title {
  font-size: 14px;
  margin-top: 8px;
  opacity: 0.6;
  font-weight: 200;
  letter-spacing: 1px;
}

.slider {
  width: 100vw;
  height: 100vh;
  position: relative;
}
.photo {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  transition: opacity 0.6s ease-out;
  will-change: opacity;
}
.photo.active {
  opacity: 1;
}

/* 播放状态实时显示 */
.play-status {
  position: fixed;
  bottom: 10vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 12px;
  opacity: 0.5;
  z-index: 90;
  pointer-events: none;
  letter-spacing: 1px;
}

.controls {
  position: fixed;
  bottom: 4vh;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 100;
}
.btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #fff;
  font-size: 16px;
  display: grid;
  place-items: center;
  backdrop-filter: blur(6px);
  transition: all 0.2;
}
.btn:active {
  background: rgba(255,255,255,0.2);
}

.petal {
  position: fixed;
  top: -10%;
  z-index: 50;
  border-radius: 50% 0 50% 50%;
  background: linear-gradient(135deg, #f6d6e4, #ffe0f0);
  opacity: 0.35;
  pointer-events: none;
  animation: fall linear infinite;
}
@keyframes fall {
  100% { transform: translateY(110vh) rotate(360deg); }
}
</style>
</head>

<body>

<!-- 加载提示 -->
<div class="loading" id="loading">
  <div class="loading-dot"></div>
  <div class="loading-text" id="loadingText">正在加载青春回忆...</div>
</div>

<div class="head-text">
  <div class="main-title">致我们的青春</div>
  <div class="sub-title">智能装备2201</div>
</div>

<div class="slider" id="slider">
  <div class="photo active" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.1.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.2.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.3.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.4.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.5.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p1.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p4.5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p6.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p7.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p8.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p9.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p10.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p11.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p12.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p19.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p21.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p24.5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p25.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p26.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p27.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p28.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p28.5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p29.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p30.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p31.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p32.webp)"></div>
</div>

<!-- 播放状态实时显示 -->
<div class="play-status" id="playStatus">点击页面播放音乐</div>

<div class="controls">
  <button class="btn" id="musicBtn">🔇</button>
  <button class="btn" id="prev">◀</button>
  <button class="btn" id="nextSong">🔀</button>
  <button class="btn" id="next">▶</button>
</div>

<!-- 音频标签（已补全闭合） -->
<audio id="bgm1" loop preload="auto" muted>
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/Chinesesong.m4a" type="audio/mp4">

<audio id="bgm2" loop preload="none" muted>
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/seeyouagain.m4a" type="audio/mp4">


<script>
const photos = document.querySelectorAll('.photo');
const bgm1 = document.getElementById('bgm1');
const bgm2 = document.getElementById('bgm2');
const musicBtn = document.getElementById('musicBtn');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const nextSongBtn = document.getElementById('nextSong');
const loading = document.getElementById('loading');
const loadingText = document.getElementById('loadingText');
const playStatus = document.getElementById('playStatus');

// 歌曲名称配置（可自行修改）
const songNames = {
  bgm1: "凤凰花开的路口",
  bgm2: "See You Again"
};

// 自动轮播间隔（固定4.5秒，永不改变）
const AUTO_SLIDE_INTERVAL = 4500;

let index = 0;
let timer = null;
let isMute = true;
let currentAudio = bgm1;
let secondSongLoaded = false;
let userInteracted = false;

// ========== 核心：更新播放状态显示 ==========
function updatePlayStatus() {
  if (!userInteracted) {
    playStatus.innerText = "点击页面播放音乐";
    return;
  }
  
  if (isMute) {
    playStatus.innerText = "🔇 静音";
  } else {
    const currentSongId = currentAudio.id;
    playStatus.innerText = `播放 ${songNames[currentSongId]}`;
  }
}

// ========== 预加载第1张图片 ==========
function preloadFirstImage() {
  return new Promise((resolve) => {
    loadingText.innerText = "正在加载第一张照片...";
    const firstImg = new Image();
    firstImg.src = photos[0].style.backgroundImage.replace(/url\(["']?(.*?)["']?\)/, '$1');
    firstImg.onload = firstImg.onerror = () => resolve();
    setTimeout(resolve, 1500); // 图片加载超时1.5秒
  });
}

// ========== 强制预加载第一首中文歌（必须完成） ==========
function preloadFirstAudio() {
  return new Promise((resolve) => {
    loadingText.innerText = "正在加载背景音乐...";
    
    // 监听音乐完全可以播放事件
    bgm1.oncanplaythrough = () => {
      loadingText.innerText = "准备就绪...";
      resolve();
    };
    
    // 音乐加载失败时也继续
    bgm1.onerror = () => {
      loadingText.innerText = "音乐加载失败，继续进入...";
      resolve();
    };
    
    // 超时保护：3秒后无论如何都继续
    setTimeout(() => {
      loadingText.innerText = "准备就绪...";
      resolve();
    }, 3000);
  });
}

// ========== 统一播放控制函数 ==========
function playAudio() {
  if (!userInteracted) return;
  
  currentAudio.muted = isMute;
  if (!isMute) {
    currentAudio.play().catch(() => {
      // 播放失败时自动回退到静音状态
      isMute = true;
      musicBtn.innerText = "🔇";
      updatePlayStatus();
    });
  } else {
    currentAudio.pause();
  }
  updatePlayStatus();
}

// ========== 加载完成后启动 ==========
async function init() {
  // 顺序加载：先图片 → 再音乐 → 全部完成后显示
  await preloadFirstImage();
  await preloadFirstAudio();
  
  // 隐藏加载提示
  loading.classList.add('hidden');
  
  // 开始自动轮播
  startAutoSlide();
  updatePlayStatus();
  
  // 监听用户第一次交互（点击任意位置）
  document.addEventListener('click', function firstInteraction() {
    if (!userInteracted) {
      userInteracted = true;
      isMute = false;
      musicBtn.innerText = "🔊";
      playAudio();
      document.removeEventListener('click', firstInteraction);
    }
  }, { once: true });
}

// ========== 轮播逻辑（每次只预加载下1张） ==========
function slide() {
  photos[index].classList.remove('active');
  index = (index + 1) % photos.length;
  photos[index].classList.add('active');
  
  // 只预加载下一张图片，不预加载更多
  const nextIndex = (index + 1) % photos.length;
  const tempImg = new Image();
  tempImg.src = photos[nextIndex].style.backgroundImage.replace(/url\(["']?(.*?)["']?\)/, '$1');
}

function startAutoSlide() {
  // 确保定时器唯一，避免多个定时器同时运行
  if (timer) clearInterval(timer);
  timer = setInterval(slide, AUTO_SLIDE_INTERVAL);
}

// ========== 按钮翻页逻辑（不改变轮播速率） ==========
prevBtn.onclick = (e) => {
  e.stopPropagation();
  // 切换到上一张
  photos[index].classList.remove('active');
  index = (index - 1 + photos.length) % photos.length;
  photos[index].classList.add('active');
  
  // 预加载下一张
  const nextIndex = (index + 1) % photos.length;
  const tempImg = new Image();
  tempImg.src = photos[nextIndex].style.backgroundImage.replace(/url\(["']?(.*?)["']?\)/, '$1');
  
  // 重启定时器，保持4.5秒间隔（速率不变）
  startAutoSlide();
};

nextBtn.onclick = (e) => {
  e.stopPropagation();
  // 切换到下一张
  slide();
  // 重启定时器，保持4.5秒间隔（速率不变）
  startAutoSlide();
};

// ========== 音乐控制 ==========
musicBtn.onclick = (e) => {
  e.stopPropagation();
  isMute = !isMute;
  musicBtn.innerText = isMute ? "🔇" : "🔊";
  playAudio();
};

// ========== 切歌逻辑（点击时才加载第二首） ==========
nextSongBtn.onclick = (e) => {
  e.stopPropagation();
  
  // 暂停当前歌曲并重置进度
  currentAudio.pause();
  currentAudio.currentTime = 0;
  
  // 切换到下一首
  currentAudio = currentAudio === bgm1 ? bgm2 : bgm1;
  
  // 第一次切到第二首时手动加载
  if (currentAudio === bgm2 && !secondSongLoaded) {
    bgm2.load();
    secondSongLoaded = true;
  }
  
  // 保持当前静音/播放状态
  currentAudio.muted = isMute;
  playAudio();
};

// ========== 花瓣动画（延迟1秒启动，不抢占首屏资源） ==========
setTimeout(() => {
  function petal() {
    const p = document.createElement('div');
    p.classList.add('petal');
    const s = Math.random() * 6 + 4;
    p.style.width = s + 'px';
    p.style.height = s * 0.8 + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = Math.random() * 7 + 6 + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 13000);
  }
  setInterval(petal, 1200); // 降低生成频率，减少CPU占用
}, 1000);

// DOM加载完成后立即启动
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
