<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 移动端核心适配：禁止缩放、优化视口、微信兼容 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<!-- 微信X5内核优化 -->
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="renderer" content="webkit">
<!-- CDN预连接，提前建立链接 -->
<link rel="preconnect" href="cdn.jsdelivr.net" crossorigin>
<meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable">
<title>致我们的青春</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  user-select: none;
  /* 移动端防闪烁 */
  -webkit-font-smoothing: antialiased;
  -webkit-backface-visibility: hidden;
}

/* 加载页 */
.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 0.3s ease-out;
}
.loading-text {
  color: #fff;
  font-size: 16px;
  opacity: 0.7;
  letter-spacing: 2px;
  margin-top: 20px;
}
.loading-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.5); opacity: 1; }
}
.loading.hidden {
  opacity: 0;
  pointer-events: none;
}
/* 新增进度条样式，不改变原有布局 */
.loading-progress {
  width: 200px;
  height: 2px;
  background: rgba(255,255,255,0.2);
  border-radius: 4px;
  margin-top: 24px;
  overflow: hidden;
}
.loading-progress-bar {
  width: 0%;
  height: 100%;
  background: #f0a3be;
  transition: width 0.2s ease;
}
.loading-percent {
  font-size: 12px;
  margin-top: 12px;
  opacity: 0.7;
}

.head-text {
  position: fixed;
  top: 5vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  z-index: 99;
  pointer-events: none;
}
.main-title {
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 3px;
  opacity: 0.92;
}
.sub-title {
  font-size: 14px;
  margin-top: 8px;
  opacity: 0.6;
  font-weight: 200;
  letter-spacing: 1px;
}

.slider {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}
.photo {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 0.4s ease-out;
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
}
.photo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}
.photo.active {
  opacity: 1;
}

.play-status {
  position: fixed;
  bottom: 10vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 12px;
  opacity: 0.5;
  z-index: 90;
  pointer-events: none;
  letter-spacing: 1px;
}

.controls {
  position: fixed;
  bottom: 4vh;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 100;
}
.btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #fff;
  font-size: 16px;
  display: grid;
  place-items: center;
  backdrop-filter: blur(6px);
  transition: all 0.2s;
}
.btn:active {
  background: rgba(255,255,255,0.2);
}

.petal {
  position: fixed;
  top: -10%;
  z-index: 50;
  border-radius: 50% 0 50% 50%;
  background: linear-gradient(135deg, #f6d6e4, #ffe0f0);
  opacity: 0.35;
  pointer-events: none;
  animation: fall linear infinite;
}
@keyframes fall {
  100% { transform: translateY(110vh) rotate(360deg); }
}
</style>
</head>

<div class="play-status" id="playStatus">点击页面播放音乐</div>

<div class="controls">
  <button class="btn" id="musicBtn">🔇</button>
  <button class="btn" id="prev">◀</button>
  <button class="btn" id="nextSong">🔀</button>
  <button class="btn" id="next">▶</button>

<!-- 音频改用可靠的mp3格式，preload="auto" 以便预加载 -->
<audio id="bgm1" loop preload="auto" crossorigin="anonymous">
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/Chinesesong.mp3" type="audio/mpeg">
</audio>
<audio id="bgm2" loop preload="auto" crossorigin="anonymous">
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/seeyouagain.mp3" type="audio/mpeg">
</audio>

<script>
// ----------------------------- 图片按需加载 + 进度管理 -----------------------------
const photos = document.querySelectorAll('.photo');
const totalImages = photos.length;
let loadedCount = 0;          // 已成功加载的图片数
let musicReady = { bgm1: false, bgm2: false };
let totalAssets = totalImages + 2;   // 图片 + 两首音乐
let loadCompleted = false;

const progressBar = document.getElementById('progressBar');
const percentText = document.getElementById('percentText');
const loadingDiv = document.getElementById('loading');

function updateProgress() {
  let percent = Math.floor((loadedCount + (musicReady.bgm1 ? 1 : 0) + (musicReady.bgm2 ? 1 : 0)) / totalAssets * 100);
  percent = Math.min(100, percent);
  progressBar.style.width = percent + '%';
  percentText.innerText = percent + '%';
  if (percent === 100 && !loadCompleted) {
    loadCompleted = true;
    setTimeout(() => {
      loadingDiv.classList.add('hidden');
      startSlide();
    }, 300);
  }
}

// 加载单张图片（仅当需要时调用）
function loadImage(imgElement, url) {
  return new Promise((resolve) => {
    if (imgElement.src && imgElement.src === url && imgElement.complete) {
      resolve();
      return;
    }
    const timer = setTimeout(() => {
      resolve(); // 超时也继续
    }, 5000);
    imgElement.onload = () => {
      clearTimeout(timer);
      resolve();
    };
    imgElement.onerror = () => {
      clearTimeout(timer);
      resolve();
    };
    imgElement.src = url;
  });
}

// 预加载全部图片（并发控制，避免手机端过多请求）
async function preloadAllImagesWithConcurrency(concurrency = 3) {
  const imgElements = Array.from(document.querySelectorAll('.photo img'));
  const urls = imgElements.map(img => img.getAttribute('data-src'));
  const indexQueue = Array.from({ length: urls.length }, (_, i) => i);
  let active = 0;

  return new Promise((resolve) => {
    function next() {
      if (indexQueue.length === 0 && active === 0) {
        resolve();
        return;
      }
      while (active < concurrency && indexQueue.length > 0) {
        const idx = indexQueue.shift();
        active++;
        const img = imgElements[idx];
        const url = urls[idx];
        // 直接加载，每加载完一张更新进度
        loadImage(img, url).finally(() => {
          loadedCount++;
          updateProgress();
          active--;
          next();
        });
      }
    }
    next();
  });
}

// 音乐预加载（通过fetch+blob实现高兼容、强制缓存）
async function preloadMusicAsBlob(url, songId) {
  try {
    const response = await fetch(url, { cache: "force-cache", mode: "cors" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const blob = await response.blob();
    const blobUrl = URL.createObjectURL(blob);
    // 更新audio元素src
    const audioEl = document.getElementById(songId);
    audioEl.src = blobUrl;
    audioEl.load();
    musicReady[songId] = true;
    updateProgress();
    return blobUrl;
  } catch (err) {
    console.warn(`${songId} 预加载失败，使用原始URL:`, err);
    // 降级：直接使用原始URL，但标记为已加载（防止卡进度）
    musicReady[songId] = true;
    updateProgress();
    return null;
  }
}

// ----------------------------- 轮播与音频控制 -----------------------------
let currentIndex = 0;
let autoTimer = null;
let isMuted = true;
let userInteracted = false;
let currentAudio = document.getElementById('bgm1');
let isSliding = false;   // 防止快速切换

const playStatusSpan = document.getElementById('playStatus');
const musicBtnUI = document.getElementById('musicBtn');
const prevBtnUI = document.getElementById('prev');
const nextBtnUI = document.getElementById('next');
const nextSongBtnUI = document.getElementById('nextSong');

const songNames = { bgm1: "凤凰花开的路口", bgm2: "See You Again" };

function updateStatusText() {
  if (!userInteracted) {
    playStatusSpan.textContent = '点击页面播放音乐';
    return;
  }
  if (isMuted) {
    playStatusSpan.textContent = `🔇 静音 · ${songNames[currentAudio.id]}`;
  } else {
    playStatusSpan.textContent = `🎧 正在播放 · ${songNames[currentAudio.id]} 🎧`;
  }
}

// 播放或暂停音乐（根据静音状态）
function applyAudioState() {
  if (!userInteracted) return;
  if (!isMuted) {
    currentAudio.muted = false;
    currentAudio.play().catch(err => {
      console.warn("自动播放失败:", err);
      // 若失败则回退静音
      isMuted = true;
      musicBtnUI.textContent = '🔇';
      updateStatusText();
    });
  } else {
    currentAudio.pause();
  }
  updateStatusText();
}

// 切换图片（核心：只加载需要的图片，不卡顿）
async function switchToPhoto(newIndex, direction = 'next') {
  if (isSliding) return;
  isSliding = true;

  const targetPhoto = photos[newIndex];
  const targetImg = targetPhoto.querySelector('img');
  const targetUrl = targetImg.getAttribute('data-src');
  
  // 确保目标图片已加载（如果未加载则等待）
  if (!targetImg.src || targetImg.src !== targetUrl) {
    await loadImage(targetImg, targetUrl);
  }
  
  // 移除当前活跃
  photos[currentIndex].classList.remove('active');
  currentIndex = newIndex;
  photos[currentIndex].classList.add('active');
  
  // 智能预加载：提前加载下一张（轮播方向）
  const nextIndex = (currentIndex + 1) % totalImages;
  const nextPhoto = photos[nextIndex];
  const nextImg = nextPhoto.querySelector('img');
  const nextUrl = nextImg.getAttribute('data-src');
  if (!nextImg.src || nextImg.src !== nextUrl) {
    // 异步预加载，不阻塞
    loadImage(nextImg, nextUrl);
  }
  // 再预加载前一张（可选）
  const prevIndex = (currentIndex - 1 + totalImages) % totalImages;
  const prevPhoto = photos[prevIndex];
  const prevImg = prevPhoto.querySelector('img');
  const prevUrl = prevImg.getAttribute('data-src');
  if (!prevImg.src || prevImg.src !== prevUrl) {
    loadImage(prevImg, prevUrl);
  }
  
  isSliding = false;
}

// 下一张
async function nextPhoto() {
  if (isSliding) return;
  const newIdx = (currentIndex + 1) % totalImages;
  await switchToPhoto(newIdx, 'next');
  resetAutoTimer();
}

// 上一张
async function prevPhoto() {
  if (isSliding) return;
  const newIdx = (currentIndex - 1 + totalImages) % totalImages;
  await switchToPhoto(newIdx, 'prev');
  resetAutoTimer();
}

function resetAutoTimer() {
  if (autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(() => {
    nextPhoto();
  }, 4500);
}

function startSlide() {
  if (autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(() => {
    nextPhoto();
  }, 4500);
}

// 音乐控制
function toggleMute() {
  if (!userInteracted) {
    // 尚未交互，触发一次解锁
    userInteracted = true;
    isMuted = false;
    musicBtnUI.textContent = '🔊';
    applyAudioState();
  } else {
    isMuted = !isMuted;
    musicBtnUI.textContent = isMuted ? '🔇' : '🔊';
    applyAudioState();
  }
}

function switchSong() {
  if (!userInteracted) {
    userInteracted = true;
    isMuted = false;
    musicBtnUI.textContent = '🔊';
  }
  const newAudio = currentAudio.id === 'bgm1' ? document.getElementById('bgm2') : document.getElementById('bgm1');
  const wasPlaying = (!isMuted && !currentAudio.paused);
  currentAudio.pause();
  currentAudio.currentTime = 0;
  currentAudio = newAudio;
  if (wasPlaying || !isMuted) {
    currentAudio.currentTime = 0;
    currentAudio.play().catch(e => console.warn);
  }
  updateStatusText();
}

// 全局点击解锁音频（兼容移动端）
function unlockAudioHandler() {
  if (!userInteracted) {
    userInteracted = true;
    isMuted = false;
    musicBtnUI.textContent = '🔊';
    applyAudioState();
    // 移除监听，只触发一次
    document.removeEventListener('touchstart', unlockAudioHandler);
    document.removeEventListener('click', unlockAudioHandler);
  }
}
document.addEventListener('touchstart', unlockAudioHandler, { once: true, passive: true });
document.addEventListener('click', unlockAudioHandler, { once: true });
// 额外保证按钮也能触发解锁（但避免重复）
[musicBtnUI, prevBtnUI, nextBtnUI, nextSongBtnUI].forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!userInteracted) {
      userInteracted = true;
      isMuted = false;
      musicBtnUI.textContent = '🔊';
      applyAudioState();
    }
  });
});

// 绑定按钮事件
musicBtnUI.onclick = (e) => {
  e.stopPropagation();
  toggleMute();
};
prevBtnUI.onclick = (e) => {
  e.stopPropagation();
  prevPhoto();
};
nextBtnUI.onclick = (e) => {
  e.stopPropagation();
  nextPhoto();
};
nextSongBtnUI.onclick = (e) => {
  e.stopPropagation();
  switchSong();
};

// ----------------------------- 初始化流程 -----------------------------
async function init() {
  // 首先显示初始图片（第一个photo里img的data-src转src）
  const firstImg = photos[0].querySelector('img');
  const firstUrl = firstImg.getAttribute('data-src');
  await loadImage(firstImg, firstUrl);
  loadedCount = 1;
  updateProgress();
  
  // 并发预加载剩余图片（限制3并发，手机友好）
  preloadAllImagesWithConcurrency(3);
  
  // 预加载两首音乐（使用blob方式，兼容且提速）
  Promise.all([
    preloadMusicAsBlob("https://cdn.jsdelivr.net/gh/zn099/classphotos/Chinesesong.mp3", "bgm1"),
    preloadMusicAsBlob("https://cdn.jsdelivr.net/gh/zn099/classphotos/seeyouagain.mp3", "bgm2")
  ]).then(() => {
    // 音乐预加载完成，更新进度已在内部调用
  });
  
  // 预加载完成后自动隐藏loading并开始轮播（由updateProgress触发）
}

// 花瓣动画（与原效果一致）
setTimeout(() => {
  setInterval(() => {
    const p = document.createElement('div');
    p.className = 'petal';
    const s = Math.random() * 6 + 4;
    p.style.cssText = `width:${s}px;height:${s*0.8}px;left:${Math.random()*100}%;animation-duration:${Math.random()*7+6}s`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 13000);
  }, 1200);
}, 1000);

init();
</script>
