<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<!-- 强化缓存 + 预连接CDN，提前建立网络连接，大幅提速 -->
<meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable">
<link rel="preconnect" href="cdn.jsdelivr.net">
<title>致我们的青春</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  user-select: none;
}

/* 加载提示 */
.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 0.3s ease-out;
}
.loading-text {
  color: #fff;
  font-size: 16px;
  opacity: 0.7;
  letter-spacing: 2px;
  margin-top: 20px;
}
.loading-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.5); opacity: 1; }
}
.loading.hidden {
  opacity: 0;
  pointer-events: none;
}

.head-text {
  position: fixed;
  top: 5vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  z-index: 99;
  pointer-events: none;
}
.main-title {
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 3px;
  opacity: 0.92;
}
.sub-title {
  font-size: 14px;
  margin-top: 8px;
  opacity: 0.6;
  font-weight: 200;
  letter-spacing: 1px;
}

.slider {
  width: 100vw;
  height: 100vh;
  position: relative;
}
.photo {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  transition: opacity 0.4s ease-out;
  will-change: opacity;
}
.photo.active {
  opacity: 1;
}

.play-status {
  position: fixed;
  bottom: 10vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 12px;
  opacity: 0.5;
  z-index: 90;
  pointer-events: none;
  letter-spacing: 1px;
}

.controls {
  position: fixed;
  bottom: 4vh;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 100;
}
.btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #fff;
  font-size: 16px;
  display: grid;
  place-items: center;
  backdrop-filter: blur(6px);
  transition: all 0.2s;
}
.btn:active {
  background: rgba(255,255,255,0.2);
}

.petal {
  position: fixed;
  top: -10%;
  z-index: 50;
  border-radius: 50% 0 50% 50%;
  background: linear-gradient(135deg, #f6d6e4, #ffe0f0);
  opacity: 0.35;
  pointer-events: none;
  animation: fall linear infinite;
}
@keyframes fall {
  100% { transform: translateY(110vh) rotate(360deg); }
}
</style>
</head>

<body>
<div class="loading" id="loading">
  <div class="loading-dot"></div>
  <div class="loading-text">回忆加载中</div>
</div>

<div class="head-text">
  <div class="main-title">致我们的青春</div>
  <div class="sub-title">智能装备2201</div>
</div>

<div class="slider" id="slider">
  <div class="photo active" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.1.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.2.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.3.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.4.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p1.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p2.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p7.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p8.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p9.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p10.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p11.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p24.5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p25.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p27.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p28.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p28.5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p29.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p30.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p31.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p32.webp)"></div>
</div>

<div class="play-status" id="playStatus">点击页面播放音乐</div>

<div class="controls">
  <button class="btn" id="musicBtn">🔇</button>
  <button class="btn" id="prev">◀</button>
  <button class="btn" id="nextSong">🔀</button>
  <button class="btn" id="next">▶</button>
</div>

<!-- 音频：流式播放优先，不等待全量加载 -->
<audio id="bgm1" loop preload="metadata">
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/Chinesesong.m4a" type="audio/mp4">

<audio id="bgm2" loop preload="metadata">
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/seeyouagain.m4a" type="audio/mp4">


<script>
const photos = document.querySelectorAll('.photo');
const bgm1 = document.getElementById('bgm1');
const bgm2 = document.getElementById('bgm2');
const musicBtn = document.getElementById('musicBtn');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const nextSongBtn = document.getElementById('nextSong');
const loading = document.getElementById('loading');
const playStatus = document.getElementById('playStatus');

const songNames = { bgm1: "凤凰花开的路口", bgm2: "See You Again" };
const AUTO_SLIDE_INTERVAL = 4500;

let index = 0;
let timer = null;
let isMute = true;
let currentAudio = bgm1;
let userInteracted = false;
const loadedImages = new Set();
let isSliding = false;

// 更新状态栏
function updateStatus() {
  if (!userInteracted) {
    playStatus.textContent = '点击页面播放音乐';
    return;
  }
  playStatus.textContent = isMute ? '🔇 静音' : `正在播放 ${songNames[currentAudio.id]}`;
}

// 提取图片地址
function getPhotoUrl(el) {
  return el.style.backgroundImage.replace(/url\(["']?(.*?)["']?\)/, '$1');
}

// 图片加载：带超时，卡死自动放行
function loadImage(url, timeout = 3000) {
  if (loadedImages.has(url)) return Promise.resolve();
  return new Promise(resolve => {
    const img = new Image();
    let timer = setTimeout(resolve, timeout);
    img.onload = () => {
      clearTimeout(timer);
      loadedImages.add(url);
      resolve();
    };
    img.onerror = () => {
      clearTimeout(timer);
      resolve();
    };
    img.src = url;
  });
}

// 音频播放：纯流式，有缓冲就播放
function playAudio() {
  if (!userInteracted) return;
  currentAudio.muted = isMute;
  if (!isMute) {
    currentAudio.play().catch(() => {
      isMute = true;
      musicBtn.textContent = '🔇';
    });
  } else {
    currentAudio.pause();
  }
  updateStatus();
}

// 轮播核心：只等下一张，后台懒加载后续图片
async function slide() {
  if (isSliding) return;
  isSliding = true;

  const nextIdx = (index + 1) % photos.length;
  await loadImage(getPhotoUrl(photos[nextIdx]));

  photos[index].classList.remove('active');
  index = nextIdx;
  photos[index].classList.add('active');

  // 懒加载后面2张，不抢占网络
  setTimeout(() => {
    loadImage(getPhotoUrl(photos[(index + 1) % photos.length]));
    loadImage(getPhotoUrl(photos[(index + 2) % photos.length]));
  }, 500);

  isSliding = false;
}

function startSlide() {
  clearInterval(timer);
  timer = setInterval(slide, AUTO_SLIDE_INTERVAL);
}

// 初始化：极速进入页面，不等待全部资源
async function init() {
  // 只强制加载当前第一张，其余懒加载
  await loadImage(getPhotoUrl(photos[0]));
  // 1.2秒直接关闭加载页，不再长时间等待
  setTimeout(() => {
    loading.classList.add('hidden');
    startSlide();
    updateStatus();
  }, 1200);

  // 后台分批预加载前5张常用图，提升开头体验
  for (let i = 1; i <= 4; i++) {
    setTimeout(() => loadImage(getPhotoUrl(photos[i])), i * 200);
  }
}

// 首次点击立刻解锁音频
document.addEventListener('click', () => {
  if (!userInteracted) {
    userInteracted = true;
    isMute = false;
    musicBtn.textContent = '🔊';
    playAudio();
  }
}, { once: true });

// 上一张
prevBtn.onclick = async (e) => {
  e.stopPropagation();
  if (isSliding) return;
  isSliding = true;

  const prevIdx = (index - 1 + photos.length) % photos.length;
  await loadImage(getPhotoUrl(photos[prevIdx]));

  photos[index].classList.remove('active');
  index = prevIdx;
  photos[index].classList.add('active');
  isSliding = false;
  startSlide();
};

// 下一张
nextBtn.onclick = (e) => {
  e.stopPropagation();
  slide();
  startSlide();
};

// 静音切换
musicBtn.onclick = (e) => {
  e.stopPropagation();
  isMute = !isMute;
  musicBtn.textContent = isMute ? '🔇' : '🔊';
  playAudio();
};

// 切歌
nextSongBtn.onclick = (e) => {
  e.stopPropagation();
  currentAudio.pause();
  currentAudio.currentTime = 0;
  currentAudio = currentAudio === bgm1 ? bgm2 : bgm1;
  playAudio();
};

// 花瓣动画
setTimeout(() => {
  setInterval(() => {
    const p = document.createElement('div');
    p.className = 'petal';
    const s = Math.random() * 6 + 4;
    p.style.cssText = `width:${s}px;height:${s*0.8}px;left:${Math.random()*100}%;animation-duration:${Math.random()*7+6}s`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 13000);
  }, 1200);
}, 1000);

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
