<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  user-select: none;
  -webkit-font-smoothing: antialiased;
  -webkit-backface-visibility: hidden;
}

.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 0.3s ease-out;
}
.loading-text {
  color: #fff;
  font-size: 16px;
  opacity: 0.7;
  letter-spacing: 2px;
  margin-top: 20px;
}
.loading-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.5); opacity: 1; }
}
.loading.hidden {
  opacity: 0;
  pointer-events: none;
}
.loading-progress {
  width: 200px;
  height: 2px;
  background: rgba(255,255,255,0.2);
  border-radius: 4px;
  margin-top: 24px;
  overflow: hidden;
}
.loading-progress-bar {
  width: 0%;
  height: 100%;
  background: #f0a3be;
  transition: width 0.2s ease;
}
.loading-percent {
  font-size: 12px;
  margin-top: 12px;
  opacity: 0.7;
}

.head-text {
  position: fixed;
  top: 5vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  z-index: 99;
  pointer-events: none;
}
.main-title {
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 3px;
  opacity: 0.92;
}
.sub-title {
  font-size: 14px;
  margin-top: 8px;
  opacity: 0.6;
  font-weight: 200;
  letter-spacing: 1px;
}

.slider {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}
.photo {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 0.4s ease-out;
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
}
.photo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}
.photo.active {
  opacity: 1;
}

.play-status {
  position: fixed;
  bottom: 10vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 12px;
  opacity: 0.5;
  z-index: 90;
  pointer-events: none;
  letter-spacing: 1px;
}

.controls {
  position: fixed;
  bottom: 4vh;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 100;
}
.btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #fff;
  font-size: 16px;
  display: grid;
  place-items: center;
  backdrop-filter: blur(6px);
  transition: all 0.2s;
}
.btn:active {
  background: rgba(255,255,255,0.2);
}

.petal {
  position: fixed;
  top: -10%;
  z-index: 50;
  border-radius: 50% 0 50% 50%;
  background: linear-gradient(135deg, #f6d6e4, #ffe0f0);
  opacity: 0.35;
  pointer-events: none;
  animation: fall linear infinite;
}
@keyframes fall {
  100% { transform: translateY(110vh) rotate(360deg); }
}
</style>
</head>

<div class="play-status" id="playStatus">点击页面播放音乐</div>

<!-- 音频使用 preload="metadata"，仅加载头信息，不下载完整歌曲 -->
<audio id="bgm1" loop preload="metadata" crossorigin="anonymous">
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/Chinesesong.mp3" type="audio/mpeg">
</audio>
<audio id="bgm2" loop preload="metadata" crossorigin="anonymous">
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/seeyouagain.mp3" type="audio/mpeg">
</audio>

<script>
// ----------------------------- 图片预加载 + 进度管理 (音乐不再预加载) -----------------------------
const photos = document.querySelectorAll('.photo');
const totalImages = photos.length;
let loadedCount = 0;
let loadCompleted = false;

const progressBar = document.getElementById('progressBar');
const percentText = document.getElementById('percentText');
const loadingDiv = document.getElementById('loading');

function updateProgress() {
  let percent = Math.floor((loadedCount / totalImages) * 100);
  percent = Math.min(100, percent);
  progressBar.style.width = percent + '%';
  percentText.innerText = percent + '%';
  if (percent === 100 && !loadCompleted) {
    loadCompleted = true;
    setTimeout(() => {
      loadingDiv.classList.add('hidden');
      startSlide();
    }, 300);
  }
}

// 加载单张图片
function loadImage(imgElement, url) {
  return new Promise((resolve) => {
    if (imgElement.src && imgElement.src === url && imgElement.complete) {
      resolve();
      return;
    }
    const timer = setTimeout(() => resolve(), 5000);
    imgElement.onload = () => {
      clearTimeout(timer);
      resolve();
    };
    imgElement.onerror = () => {
      clearTimeout(timer);
      resolve();
    };
    imgElement.src = url;
  });
}

// 并发预加载全部图片（3个并发，手机友好）
async function preloadAllImagesWithConcurrency(concurrency = 3) {
  const imgElements = Array.from(document.querySelectorAll('.photo img'));
  const urls = imgElements.map(img => img.getAttribute('data-src'));
  const indexQueue = Array.from({ length: urls.length }, (_, i) => i);
  let active = 0;

  return new Promise((resolve) => {
    function next() {
      if (indexQueue.length === 0 && active === 0) {
        resolve();
        return;
      }
      while (active < concurrency && indexQueue.length > 0) {
        const idx = indexQueue.shift();
        active++;
        const img = imgElements[idx];
        const url = urls[idx];
        loadImage(img, url).finally(() => {
          loadedCount++;
          updateProgress();
          active--;
          next();
        });
      }
    }
    next();
  });
}

// ----------------------------- 轮播与音频控制 -----------------------------
let currentIndex = 0;
let autoTimer = null;
let isMuted = true;
let userInteracted = false;
let currentAudio = document.getElementById('bgm1');
let isSliding = false;

const playStatusSpan = document.getElementById('playStatus');
const musicBtnUI = document.getElementById('musicBtn');
const prevBtnUI = document.getElementById('prev');
const nextBtnUI = document.getElementById('next');
const nextSongBtnUI = document.getElementById('nextSong');

const songNames = { bgm1: "凤凰花开的路口", bgm2: "See You Again" };

function updateStatusText() {
  if (!userInteracted) {
    playStatusSpan.textContent = '点击页面播放音乐';
    return;
  }
  if (isMuted) {
    playStatusSpan.textContent = `🔇 静音 · ${songNames[currentAudio.id]}`;
  } else {
    playStatusSpan.textContent = `🎧 正在播放 · ${songNames[currentAudio.id]} 🎧`;
  }
}

// 播放或暂停音乐（根据静音状态）
function applyAudioState() {
  if (!userInteracted) return;
  if (!isMuted) {
    currentAudio.muted = false;
    currentAudio.play().catch(err => {
      console.warn("自动播放失败:", err);
      isMuted = true;
      musicBtnUI.textContent = '🔇';
      updateStatusText();
    });
  } else {
    currentAudio.pause();
  }
  updateStatusText();
}

// 切换图片（按需加载，且预加载相邻图片）
async function switchToPhoto(newIndex) {
  if (isSliding) return;
  isSliding = true;

  const targetPhoto = photos[newIndex];
  const targetImg = targetPhoto.querySelector('img');
  const targetUrl = targetImg.getAttribute('data-src');
  
  if (!targetImg.src || targetImg.src !== targetUrl) {
    await loadImage(targetImg, targetUrl);
  }
  
  photos[currentIndex].classList.remove('active');
  currentIndex = newIndex;
  photos[currentIndex].classList.add('active');
  
  // 预加载下一张和上一张
  const nextIndex = (currentIndex + 1) % totalImages;
  const nextPhoto = photos[nextIndex];
  const nextImg = nextPhoto.querySelector('img');
  const nextUrl = nextImg.getAttribute('data-src');
  if (!nextImg.src || nextImg.src !== nextUrl) loadImage(nextImg, nextUrl);
  
  const prevIndex = (currentIndex - 1 + totalImages) % totalImages;
  const prevPhoto = photos[prevIndex];
  const prevImg = prevPhoto.querySelector('img');
  const prevUrl = prevImg.getAttribute('data-src');
  if (!prevImg.src || prevImg.src !== prevUrl) loadImage(prevImg, prevUrl);
  
  isSliding = false;
}

async function nextPhoto() {
  if (isSliding) return;
  const newIdx = (currentIndex + 1) % totalImages;
  await switchToPhoto(newIdx);
  resetAutoTimer();
}

async function prevPhoto() {
  if (isSliding) return;
  const newIdx = (currentIndex - 1 + totalImages) % totalImages;
  await switchToPhoto(newIdx);
  resetAutoTimer();
}

function resetAutoTimer() {
  if (autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(() => { nextPhoto(); }, 4500);
}

function startSlide() {
  if (autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(() => { nextPhoto(); }, 4500);
}

// 音乐控制
function toggleMute() {
  if (!userInteracted) {
    userInteracted = true;
    isMuted = false;
    musicBtnUI.textContent = '🔊';
    applyAudioState();
  } else {
    isMuted = !isMuted;
    musicBtnUI.textContent = isMuted ? '🔇' : '🔊';
    applyAudioState();
  }
}

function switchSong() {
  if (!userInteracted) {
    userInteracted = true;
    isMuted = false;
    musicBtnUI.textContent = '🔊';
  }
  const newAudio = currentAudio.id === 'bgm1' ? document.getElementById('bgm2') : document.getElementById('bgm1');
  const wasPlaying = (!isMuted && !currentAudio.paused);
  currentAudio.pause();
  currentAudio.currentTime = 0;
  currentAudio = newAudio;
  if (wasPlaying || !isMuted) {
    currentAudio.play().catch(e => console.warn);
  }
  updateStatusText();
}

// 全局点击解锁音频（兼容移动端）
function unlockAudioHandler() {
  if (!userInteracted) {
    userInteracted = true;
    isMuted = false;
    musicBtnUI.textContent = '🔊';
    applyAudioState();
    document.removeEventListener('touchstart', unlockAudioHandler);
    document.removeEventListener('click', unlockAudioHandler);
  }
}
document.addEventListener('touchstart', unlockAudioHandler, { once: true, passive: true });
document.addEventListener('click', unlockAudioHandler, { once: true });

[musicBtnUI, prevBtnUI, nextBtnUI, nextSongBtnUI].forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!userInteracted) {
      userInteracted = true;
      isMuted = false;
      musicBtnUI.textContent = '🔊';
      applyAudioState();
    }
  });
});

musicBtnUI.onclick = (e) => { e.stopPropagation(); toggleMute(); };
prevBtnUI.onclick = (e) => { e.stopPropagation(); prevPhoto(); };
nextBtnUI.onclick = (e) => { e.stopPropagation(); nextPhoto(); };
nextSongBtnUI.onclick = (e) => { e.stopPropagation(); switchSong(); };

// ----------------------------- 初始化 -----------------------------
async function init() {
  const firstImg = photos[0].querySelector('img');
  const firstUrl = firstImg.getAttribute('data-src');
  await loadImage(firstImg, firstUrl);
  loadedCount = 1;
  updateProgress();
  preloadAllImagesWithConcurrency(3); // 后台继续加载其余图片
}

// 花瓣动画
setTimeout(() => {
  setInterval(() => {
    const p = document.createElement('div');
    p.className = 'petal';
    const s = Math.random() * 6 + 4;
    p.style.cssText = `width:${s}px;height:${s*0.8}px;left:${Math.random()*100}%;animation-duration:${Math.random()*7+6}s`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 13000);
  }, 1200);
}, 1000);

init();
</script>
