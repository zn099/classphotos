<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="renderer" content="webkit">
<link rel="preconnect" href="cdn.jsdelivr.net" crossorigin>
<meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable">
<title>致我们的青春</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

/* 加载页 */
.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 0.3s ease-out;
}
.loading-text {
  color: #fff;
  font-size: 16px;
  opacity: 0.7;
  letter-spacing: 2px;
  margin-top: 20px;
}
.loading-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.5); opacity: 1; }
}
.loading.hidden {
  opacity: 0;
  pointer-events: none;
}

/* 顶部文字 */
.head-text {
  position: fixed;
  top: 5vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  z-index: 99;
  pointer-events: none;
}
.main-title {
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 3px;
  opacity: 0.92;
}
.sub-title {
  font-size: 14px;
  margin-top: 8px;
  opacity: 0.6;
  font-weight: 200;
  letter-spacing: 1px;
}

/* 单图片容器，仅一层，杜绝图层黑屏 */
.slider {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}
.slider-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  transition: opacity 0.4s ease-out;
  referrerpolicy="no-referrer";
}

/* 状态文字 */
.play-status {
  position: fixed;
  bottom: 10vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 12px;
  opacity: 0.5;
  z-index: 90;
  pointer-events: none;
  letter-spacing: 1px;
}

/* 按钮区域 */
.controls {
  position: fixed;
  bottom: 4vh;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 100;
}
.btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #fff;
  font-size: 16px;
  display: grid;
  place-items: center;
  backdrop-filter: blur(6px);
  transition: all 0.2s;
}
.btn:active {
  background: rgba(255,255,255,0.2);
}

/* 花瓣动画 */
.petal {
  position: fixed;
  top: -10%;
  z-index: 50;
  border-radius: 50% 0 50% 50%;
  background: linear-gradient(135deg, #f6d6e4, #ffe0f0);
  opacity: 0.35;
  pointer-events: none;
  animation: fall linear infinite;
}
@keyframes fall {
  100% { transform: translateY(110vh) rotate(360deg); }
}
</style>
</head>

<body>
<div class="loading" id="loading">
  <div class="loading-dot"></div>
  <div class="loading-text">回忆加载中</div>
</div>

<div class="head-text">
  <div class="main-title">致我们的青春</div>
  <div class="sub-title">智能装备2201</div>
</div>

<!-- 仅单张图片容器，无多层div叠加 -->
<div class="slider">
  <img class="slider-img" id="mainImg" src="https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.1.webp" alt="">
</div>

<div class="play-status" id="playStatus">点击页面播放音乐</div>

<div class="controls">
  <button class="btn" id="musicBtn">🔇</button>
  <button class="btn" id="prev">◀</button>
  <button class="btn" id="nextSong">🔀</button>
  <button class="btn" id="next">▶</button>
</div>

<!-- 音频：跨域配置，微信/iOS兼容 -->
<audio id="bgm1" loop preload="none" crossorigin="anonymous">
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/Chinesesong.mp3" type="audio/mpeg">

<audio id="bgm2" loop preload="none" crossorigin="anonymous">
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/seeyouagain.mp3" type="audio/mpeg">


<script>
// 图片地址列表
const imgList = [
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.1.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.2.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.3.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.4.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.5.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p1.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p2.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p3.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p3.5.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p4.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p4.5.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p5.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p6.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p7.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p8.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p9.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p10.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p11.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p12.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p12.4.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p12.8.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p13.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p14.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p15.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p16.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p16.5.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p17.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p18.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p19.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p20.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p21.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p22.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p23.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p24.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p24.5.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p25.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p26.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p27.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p28.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p28.5.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p29.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p30.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p31.webp",
  "https://cdn.jsdelivr.net/gh/zn099/classphotos/p32.webp"
];

// DOM元素
const mainImg = document.getElementById('mainImg');
const bgm1 = document.getElementById('bgm1');
const bgm2 = document.getElementById('bgm2');
const musicBtn = document.getElementById('musicBtn');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const nextSongBtn = document.getElementById('nextSong');
const loading = document.getElementById('loading');
const playStatus = document.getElementById('playStatus');

const songNames = { bgm1: "凤凰花开的路口", bgm2: "See You Again" };
const AUTO_SLIDE_INTERVAL = 4500;

let index = 0;
let timer = null;
let isMute = true;
let currentAudio = bgm1;
let userInteracted = false;

// 更新状态文字
function updateStatus() {
  if (!userInteracted) {
    playStatus.textContent = '点击页面播放音乐';
    return;
  }
  playStatus.textContent = isMute ? '🔇 静音' : `正在播放 ${songNames[currentAudio.id]}`;
}

// 图片预加载+超时，弱网不卡死
function preloadImg(url, timeout = 3000) {
  return new Promise(resolve => {
    const tempImg = new Image();
    let t = setTimeout(resolve, timeout);
    tempImg.onload = () => {
      clearTimeout(t);
      resolve();
    };
    tempImg.onerror = () => {
      clearTimeout(t);
      resolve();
    };
    tempImg.referrerPolicy = "no-referrer";
    tempImg.src = url;
  });
}

// 切换图片
async function changeImg(idx) {
  await preloadImg(imgList[idx]);
  mainImg.style.opacity = 0;
  setTimeout(() => {
    mainImg.src = imgList[idx];
    mainImg.style.opacity = 1;
  }, 200);
}

// 自动轮播
async function slide() {
  index = (index + 1) % imgList.length;
  await changeImg(index);
}

function startSlide() {
  clearInterval(timer);
  timer = setInterval(slide, AUTO_SLIDE_INTERVAL);
}

// 音频播放（微信/ios双事件兼容+重试）
function playAudio() {
  if (!userInteracted) return;
  currentAudio.muted = isMute;
  if (!isMute) {
    currentAudio.play().catch(() => {
      currentAudio.load();
      currentAudio.play().catch(() => {
        isMute = true;
        musicBtn.textContent = '🔇';
      });
    });
  } else {
    currentAudio.pause();
  }
  updateStatus();
}

// 解锁音频（触摸+点击双监听，微信必备）
function unlockAudio() {
  if (userInteracted) return;
  userInteracted = true;
  isMute = false;
  musicBtn.textContent = '🔊';
  playAudio();
}
document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('click', unlockAudio, { once: true });

// 初始化
async function init() {
  await preloadImg(imgList[0]);
  setTimeout(() => {
    loading.classList.add('hidden');
    startSlide();
    updateStatus();
  }, 600);
}

// 上一张
prevBtn.onclick = async (e) => {
  e.stopPropagation();
  index = (index - 1 + imgList.length) % imgList.length;
  await changeImg(index);
  startSlide();
};

// 下一张
nextBtn.onclick = (e) => {
  e.stopPropagation();
  slide();
  startSlide();
};

// 静音切换
musicBtn.onclick = (e) => {
  e.stopPropagation();
  isMute = !isMute;
  musicBtn.textContent = isMute ? '🔇' : '🔊';
  playAudio();
};

// 切换歌曲
nextSongBtn.onclick = (e) => {
  e.stopPropagation();
  currentAudio.pause();
  currentAudio.currentTime = 0;
  currentAudio = currentAudio === bgm1 ? bgm2 : bgm1;
  playAudio();
};

// 花瓣动画
setTimeout(() => {
  setInterval(() => {
    const p = document.createElement('div');
    p.className = 'petal';
    const s = Math.random() * 6 + 4;
    p.style.cssText = `width:${s}px;height:${s*0.8}px;left:${Math.random()*100}%;animation-duration:${Math.random()*7+6}s`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 13000);
  }, 1200);
}, 1000);

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
