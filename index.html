<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- 极致缓存优化 -->
<meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<!-- 预连接国内CDN，大幅提速 -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
<title>我们的青春｜班级合照</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #000;
  overflow: hidden;
  font-family: "Microsoft Yahei", sans-serif;
  transform: translateZ(0);
  will-change: opacity;
  user-select: none;
}
.title-text {
  position: fixed;
  top: 40px;
  left: 0;
  width: 100%;
  text-align: center;
  color: #ffffff;
  font-size: 26px;
  z-index: 99;
  text-shadow: 0 0 12px rgba(0,0,0,0.6);
  letter-spacing: 2px;
  pointer-events: none;
}
.sub-text {
  top: 80px;
  font-size: 16px;
  opacity: 0.9;
}
.album-box {
  width: 100vw;
  height: 100vh;
  position: relative;
  touch-action: pan-y;
  contain: layout size paint;
}
.photo-item {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 0.5s ease-out;
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  will-change: opacity;
  content-visibility: auto;
}
.photo-item.active {
  opacity: 1;
}
.petal {
  position: fixed;
  z-index: 100;
  top: -8%;
  border-radius: 50% 0 50% 50%;
  background: linear-gradient(135deg,#f8c8dc,#fad7e6);
  opacity: 0.6;
  animation: fall linear infinite;
  will-change: transform;
  pointer-events: none;
}
@keyframes fall {
  0% {transform: translateY(0) rotate(0deg) translateX(0);}
  25% {transform: translateY(25vh) rotate(90deg) translateX(6px);}
  50% {transform: translateY(50vh) rotate(180deg) translateX(-6px);}
  75% {transform: translateY(75vh) rotate(270deg) translateX(6px);}
  100% {transform: translateY(100vh) rotate(360deg) translateX(0);}
}
.tips {
  position: fixed;
  bottom: 80px;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 13px;
  opacity: 0.65;
  z-index: 99;
  pointer-events: none;
}
.control-bar {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 18px;
  padding: 10px 22px;
  background: rgba(0,0,0,0.45);
  border-radius: 50px;
  z-index: 200;
  backdrop-filter: blur(4px);
}
.control-btn {
  color: #fff;
  background: transparent;
  border: none;
  font-size: 15px;
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
}
.control-btn:hover {
  background: rgba(255,255,255,0.2);
}
.control-btn.active {
  background: rgba(255,255,255,0.3);
}
</style>
</head>
<body>

<div class="title-text">不负韶华 · 我们的班级</div>
<div class="title-text sub-text">时光不老 我们不散</div>

<div class="album-box" id="slideWrap">
  <div class="photo-item active" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p1.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p2.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p3.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p4.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p5.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p6.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p7.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p8.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p9.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p10.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p11.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p12.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p13.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p14.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p15.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p16.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p17.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p18.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p19.webp')"></div>

  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p21.webp')"></div>
  <div class="photo-item" style="background-image:url('https://cdn.jsdelivr.net/gh/zn099/classphotos/p22.webp')"></div>

</div>

<div class="tips">点击页面开启音效｜图片预缓存加载｜滑动切图｜控音启停轮播</div>

<div class="control-bar">
  <button class="control-btn" id="muteBtn">🔇 播放</button>
  <button class="control-btn" id="prevSong">⏮ 上一首</button>
  <button class="control-btn" id="nextSong">⏭ 下一首</button>
  <button class="control-btn active" id="autoPlayBtn">▶ 自动轮播</button>
</div>

<!-- 音频CDN地址 -->
<audio id="bgm1" preload="none" muted>
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/Chinesesong.mp3" type="audio/mpeg">

<audio id="bgm2" preload="none" muted>
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/seeyouagain.mp3" type="audio/mpeg">


<script>
// 极速版逻辑：只加载当前+前后1张，极致节省流量
const photos = document.querySelectorAll('.photo-item');
const slideWrap = document.getElementById('slideWrap');
let index = 0;
let slideTimer = null;
let autoPlayStatus = true;
const totalImg = photos.length;

// 仅预加载 前后1张，打开瞬间显示
const preloadNum = 1;
function preloadImg(curIndex){
  for(let i = curIndex - preloadNum; i <= curIndex + preloadNum; i++){
    let realIdx = (i + totalImg) % totalImg;
    const img = photos[realIdx].style.backgroundImage;
    // 静默加载，不阻塞页面
    const temp = new Image();
    temp.src = img.replace(/url\(["']?(.*?)["']?\)/,'$1');
  }
}

// 自动轮播
function autoSlide() {
  photos[index].classList.remove('active');
  index = (index + 1) % totalImg;
  photos[index].classList.add('active');
  preloadImg(index);
}
function startAuto() {
  slideTimer = setInterval(autoSlide, 4500);
  autoPlayStatus = true;
  document.getElementById('autoPlayBtn').classList.add('active');
}
function stopAuto() {
  clearInterval(slideTimer);
  autoPlayStatus = false;
  document.getElementById('autoPlayBtn').classList.remove('active');
}

// 触摸滑动切换
let startX = 0;
slideWrap.addEventListener('touchstart',e=>{ startX = e.touches[0].clientX; });
slideWrap.addEventListener('touchend',e=>{
  const diff = startX - e.changedTouches[0].clientX;
  photos[index].classList.remove('active');
  if(diff>40) index=(index+1)%totalImg;
  if(diff<-40) index=(index-1+totalImg)%totalImg;
  photos[index].classList.add('active');
  preloadImg(index);
});

// 鼠标拖拽切换
slideWrap.addEventListener('mousedown',e=>{ startX = e.clientX; });
slideWrap.addEventListener('mouseup',e=>{
  const diff = startX - e.clientX;
  photos[index].classList.remove('active');
  if(diff>40) index=(index+1)%totalImg;
  if(diff<-40) index=(index-1+totalImg)%totalImg;
  photos[index].classList.add('active');
  preloadImg(index);
});

// 音频控制
const bgm1 = document.getElementById('bgm1');
const bgm2 = document.getElementById('bgm2');
const muteBtn = document.getElementById('muteBtn');
let currentAudio = bgm1;
let isMute = true;

// 页面加载完毕再初始化音乐，不抢占网速
window.addEventListener('load',()=>{
  bgm1.load();bgm2.load();
  preloadImg(0);
  startAuto();
},{once:true});

// 点击解锁音频
document.addEventListener('click',()=>{
  if(isMute){
    isMute = false;
    currentAudio.muted = false;
    currentAudio.play().catch(()=>{});
    muteBtn.innerText = '🔊 静音';
  }
},{once:true});

// 自动切歌
function autoSwitchSong(){
  currentAudio.pause();
  currentAudio.currentTime = 0;
  currentAudio = currentAudio === bgm1 ? bgm2 : bgm1;
  if(!isMute) currentAudio.play().catch(()=>{});
}
bgm1.onended = autoSwitchSong;
bgm2.onended = autoSwitchSong;

// 按钮事件
muteBtn.onclick = e=>{
  e.stopPropagation();
  isMute = !isMute;
  currentAudio.muted = isMute;
  muteBtn.innerText = isMute ? '🔇 播放' : '🔊 静音';
  if(!isMute) currentAudio.play().catch(()=>{});
}
document.getElementById('nextSong').onclick=e=>{e.stopPropagation();autoSwitchSong();}
document.getElementById('prevSong').onclick=e=>{
  e.stopPropagation();
  currentAudio.pause();currentAudio.currentTime=0;
  currentAudio = currentAudio===bgm2?bgm1:bgm2;
  if(!isMute) currentAudio.play().catch(()=>{});
}
document.getElementById('autoPlayBtn').onclick=()=>{
  autoPlayStatus?stopAuto():startAuto();
}

// 轻量化花瓣动画
function createPetal() {
  const p = document.createElement('div');
  p.classList.add('petal');
  const size = Math.random()*5+3;
  p.style.width = size+'px';
  p.style.height = size*0.8+'px';
  p.style.left = Math.random()*100+'%';
  p.style.animationDuration = (Math.random()*6+5)+'s';
  document.body.appendChild(p);
  setTimeout(()=>p.remove(), 10000);
}
setInterval(createPetal, 800);
</script>
</body>
</html>
