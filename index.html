<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<title>致我们的青春</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  user-select: none;
}

/* 加载提示 */
.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 0.5s ease-out;
}
.loading-text {
  color: #fff;
  font-size: 16px;
  opacity: 0.7;
  letter-spacing: 2px;
  margin-top: 20px;
}
.loading-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.5); opacity: 1; }
}
.loading.hidden {
  opacity: 0;
  pointer-events: none;
}

.head-text {
  position: fixed;
  top: 5vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  z-index: 99;
  pointer-events: none;
}
.main-title {
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 3px;
  opacity: 0.92;
}
.sub-title {
  font-size: 14px;
  margin-top: 8px;
  opacity: 0.6;
  font-weight: 200;
  letter-spacing: 1px;
}

.slider {
  width: 100vw;
  height: 100vh;
  position: relative;
}
.photo {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  transition: opacity 0.6s ease-out;
  will-change: opacity;
}
.photo.active {
  opacity: 1;
}

.tip {
  position: fixed;
  bottom: 7vh;
  left: 0;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 12px;
  opacity: 0.4;
  z-index: 90;
  pointer-events: none;
  letter-spacing: 1px;
}

.controls {
  position: fixed;
  bottom: 4vh;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 100;
}
.btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #fff;
  font-size: 16px;
  display: grid;
  place-items: center;
  backdrop-filter: blur(6px);
  transition: all 0.2s;
}
.btn:active {
  background: rgba(255,255,255,0.2);
}

.petal {
  position: fixed;
  top: -10%;
  z-index: 50;
  border-radius: 50% 0 50% 50%;
  background: linear-gradient(135deg, #f6d6e4, #ffe0f0);
  opacity: 0.35;
  pointer-events: none;
  animation: fall linear infinite;
}
@keyframes fall {
  100% { transform: translateY(110vh) rotate(360deg); }
}
</style>
</head>

<body>

<!-- 加载提示 -->
<div class="loading" id="loading">
  <div class="loading-dot"></div>
  <div class="loading-text">正在加载青春回忆...</div>
</div>

<div class="head-text">
  <div class="main-title">致我们的青春</div>
  <div class="sub-title">智能装备2201</div>
</div>

<div class="slider" id="slider">
  <div class="photo active" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.1.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.2.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.3.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.4.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p0.5.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p1.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p2.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p3.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p4.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p4.5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p6.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p7.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p8.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p9.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p10.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p11.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p12.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p14.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p15.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p19.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p20.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p21.webp)"></div>

  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p23.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p24.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p24.5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p25.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p26.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p27.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p28.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p28.5.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p29.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p30.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p31.webp)"></div>
  <div class="photo" style="background-image:url(https://cdn.jsdelivr.net/gh/zn099/classphotos/p32.webp)"></div>
</div>

<div class="tip">左右滑动查看照片 · 点击按钮静音/切歌</div>

<div class="controls">
  <button class="btn" id="musicBtn">🔊</button>
  <button class="btn" id="prev">◀</button>
  <button class="btn" id="nextSong">🔀</button>
  <button class="btn" id="next">▶</button>
</div>

<!-- 两首AAC(m4a)格式音乐 加载更快 -->
<audio id="bgm1" loop preload="auto">
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/Chinesesong.m4a" type="audio/mp4">

<audio id="bgm2" loop preload="auto">
  <source src="https://cdn.jsdelivr.net/gh/zn099/classphotos/seeyouagain.m4a" type="audio/mp4">


<script>
const photos = document.querySelectorAll('.photo');
const slider = document.getElementById('slider');
const bgm1 = document.getElementById('bgm1');
const bgm2 = document.getElementById('bgm2');
const musicBtn = document.getElementById('musicBtn');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const nextSongBtn = document.getElementById('nextSong');
const loading = document.getElementById('loading');

let index = 0;
let timer = null;
let isMute = false;
let currentAudio = bgm1; // 默认播放第一首

// ========== 核心：预加载逻辑 ==========
// 预加载前3张关键图片（首屏+下两张）
function preloadImages() {
  return new Promise((resolve) => {
    const imagesToLoad = [
      photos[0].style.backgroundImage,
      photos[1].style.backgroundImage,
      photos[2].style.backgroundImage
    ];
    
    let loadedCount = 0;
    const totalToLoad = imagesToLoad.length;
    
    imagesToLoad.forEach(imgStyle => {
      const img = new Image();
      img.src = imgStyle.replace(/url\(["']?(.*?)["']?\)/, '$1');
      img.onload = img.onerror = () => {
        loadedCount++;
        if (loadedCount === totalToLoad) {
          resolve();
        }
      };
    });
  });
}

// 预加载两首音乐
function preloadAudio() {
  return new Promise((resolve) => {
    let loadedCount = 0;
    const total = 2;
    const checkLoaded = () => {
      loadedCount++;
      if (loadedCount === total) resolve();
    };
    bgm1.oncanplaythrough = checkLoaded;
    bgm2.oncanplaythrough = checkLoaded;
    // 超时保护：3秒后自动继续
    setTimeout(resolve, 3000);
  });
}

// 全部加载完成后启动
async function init() {
  // 并行加载图片和两首音乐
  await Promise.all([preloadImages(), preloadAudio()]);
  
  // 隐藏加载提示
  loading.classList.add('hidden');
  
  // 开始自动轮播
  startAutoSlide();
  
  // 尝试自动播放第一首音乐
  try {
    await currentAudio.play();
  } catch (e) {
    // 浏览器阻止自动播放时，点击页面任意位置播放
    document.addEventListener('click', function playOnClick() {
      currentAudio.play().catch(() => {});
      document.removeEventListener('click', playOnClick);
    }, { once: true });
  }
}

// ========== 轮播逻辑 ==========
function slide() {
  photos[index].classList.remove('active');
  index = (index + 1) % photos.length;
  photos[index].classList.add('active');
  
  // 滑动时预加载下一张图
  const nextIndex = (index + 1) % photos.length;
  const tempImg = new Image();
  tempImg.src = photos[nextIndex].style.backgroundImage.replace(/url\(["']?(.*?)["']?\)/, '$1');
}

function startAutoSlide() {
  timer = setInterval(slide, 4500);
}

function stopAutoSlide() {
  clearInterval(timer);
}

// 上一张图片
prevBtn.onclick = () => {
  stopAutoSlide();
  photos[index].classList.remove('active');
  index = (index - 1 + photos.length) % photos.length;
  photos[index].classList.add('active');
  startAutoSlide();
};

// 下一张图片
nextBtn.onclick = () => {
  stopAutoSlide();
  slide();
  startAutoSlide();
};

// ========== 音乐控制逻辑 ==========
// 静音/取消静音
musicBtn.onclick = () => {
  isMute = !isMute;
  currentAudio.muted = isMute;
  musicBtn.innerText = isMute ? "🔇" : "🔊";
};

// 手动切歌
nextSongBtn.onclick = (e) => {
  e.stopPropagation();
  // 暂停当前歌曲并重置进度
  currentAudio.pause();
  currentAudio.currentTime = 0;
  // 切换到下一首
  currentAudio = currentAudio === bgm1 ? bgm2 : bgm1;
  // 非静音状态下自动播放新歌曲
  if (!isMute) {
    currentAudio.play().catch(() => {});
  }
};

// ========== 滑动切图 ==========
let startX = 0;
slider.addEventListener('touchstart', e => startX = e.touches[0].clientX);
slider.addEventListener('touchend', e => {
  const diff = startX - e.changedTouches[0].clientX;
  stopAutoSlide();
  if (diff > 50) nextBtn.onclick();
  if (diff < -50) prevBtn.onclick();
  startAutoSlide();
});

// ========== 花瓣动画 ==========
function petal() {
  const p = document.createElement('div');
  p.classList.add('petal');
  const s = Math.random() * 6 + 4;
  p.style.width = s + 'px';
  p.style.height = s * 0.8 + 'px';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = Math.random() * 7 + 6 + 's';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 13000);
}
setInterval(petal, 900);

// 页面加载完成后启动初始化
window.addEventListener('load', init);
</script>
</body>
</html>
