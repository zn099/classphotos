<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- GitHub专属极速优化头部，修复之前解析报错标签、纯合规代码 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- 浏览器缓存、DNS预加载、合规提速标签，修复网页解析失败bug -->
<meta http-equiv="Cache-Control" content="max-age=86400">
<link rel="preconnect" href="github.com">
<title>我们的青春｜班级合照相册</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #000;
  overflow: hidden;
  font-family: "Microsoft Yahei", sans-serif;
  /* 全局硬件加速，减少图片渲染卡顿 */
  transform: translateZ(0);
  -webkit-transform: translateZ(0);
  user-select: none;
}
/* 顶部文字样式 */
.title-text {
  position: fixed;
  top: 40px;
  left: 0;
  width: 100%;
  text-align: center;
  color: #ffffff;
  font-size: 26px;
  z-index: 99;
  text-shadow: 0 0 12px rgba(0,0,0,0.6);
  letter-spacing: 2px;
  pointer-events: none;
}
.sub-text {
  top: 80px;
  font-size: 16px;
  opacity: 0.9;
}
/* 相册轮播核心优化：适配webp、支持触屏鼠标滑动、双向控制 */
.album-box {
  width: 100vw;
  height: 100vh;
  position: relative;
  touch-action: pan-y; /* 仅允许竖向滑动，横向滑动切图 */
}
.photo-item {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 1s ease-in-out;
  background-size: contain;
  background-position: center center;
  background-repeat: no-repeat;
  image-rendering: high-quality;
}
.photo-item.active {
  opacity: 1;
}
/* =========优化升级：写实柔粉花瓣 质感升级 飘落更灵动 性能更低========= */
.petal {
  position: fixed;
  z-index: 100;
  top: -8%;
  /* 写实花瓣圆角，替代扁平圆点 */
  border-radius: 50% 0 50% 50%;
  background: linear-gradient(135deg,#f8c8dc,#fad7e6);
  opacity: 0.75;
  animation: fall linear infinite;
  will-change: transform;
  pointer-events: none;
}
@keyframes fall {
  0% {transform: translateY(0) rotate(0deg) translateX(0);}
  25% {transform: translateY(25vh) rotate(90deg) translateX(8px);}
  50% {transform: translateY(50vh) rotate(180deg) translateX(-8px);}
  75% {transform: translateY(75vh) rotate(270deg) translateX(8px);}
  100% {transform: translateY(100vh) rotate(360deg) translateX(0);}
}
/* 底部提示文字 */
.tips {
  position: fixed;
  bottom: 80px;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 13px;
  opacity: 0.65;
  z-index: 99;
  pointer-events: none;
}
/* ============悬浮控制栏：静音、切歌、自动播放开关============ */
.control-bar {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 18px;
  padding: 10px 22px;
  background: rgba(0,0,0,0.45);
  border-radius: 50px;
  z-index: 200;
  backdrop-filter: blur(4px);
}
.control-btn {
  color: #fff;
  background: transparent;
  border: none;
  font-size: 15px;
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
}
.control-btn:hover {
  background: rgba(255,255,255,0.2);
}
.control-btn.active {
  background: rgba(255,255,255,0.3);
}
</style>
</head>
<body>

<div class="title-text">不负韶华 · 我们的班级</div>
<div class="title-text sub-text">时光不老 我们不散</div>

<div class="album-box" id="slideWrap">
  <!-- 已批量扩容：适配28张webp合照 p1.webp ~ p28.webp -->
  <div class="photo-item active" style="background-image:url('p1.webp')"></div>
  <div class="photo-item" style="background-image:url('p2.webp')"></div>
  <div class="photo-item" style="background-image:url('p3.webp')"></div>
  <div class="photo-item" style="background-image:url('p4.webp')"></div>
  <div class="photo-item" style="background-image:url('p5.webp')"></div>
  <div class="photo-item" style="background-image:url('p6.webp')"></div>
  <div class="photo-item" style="background-image:url('p7.webp')"></div>
  <div class="photo-item" style="background-image:url('p8.webp')"></div>
  <div class="photo-item" style="background-image:url('p9.webp')"></div>
  <div class="photo-item" style="background-image:url('p10.webp')"></div>
  <div class="photo-item" style="background-image:url('p11.webp')"></div>
  <div class="photo-item" style="background-image:url('p12.webp')"></div>
  <div class="photo-item" style="background-image:url('p13.webp')"></div>
  <div class="photo-item" style="background-image:url('p14.webp')"></div>
  <div class="photo-item" style="background-image:url('p15.webp')"></div>
  <div class="photo-item" style="background-image:url('p16.webp')"></div>
  <div class="photo-item" style="background-image:url('p17.webp')"></div>
  <div class="photo-item" style="background-image:url('p18.webp')"></div>
  <div class="photo-item" style="background-image:url('p19.webp')"></div>
  <div class="photo-item" style="background-image:url('p20.webp')"></div>
  <div class="photo-item" style="background-image:url('p21.webp')"></div>
  <div class="photo-item" style="background-image:url('p22.webp')"></div>
  <div class="photo-item" style="background-image:url('p23.webp')"></div>
  <div class="photo-item" style="background-image:url('p24.webp')"></div>
  <div class="photo-item" style="background-image:url('p25.webp')"></div>
  <div class="photo-item" style="background-image:url('p26.webp')"></div>
  <div class="photo-item" style="background-image:url('p27.webp')"></div>
  <div class="photo-item" style="background-image:url('p28.webp')"></div>
</div>

<div class="tips">点击页面开启音效｜左右滑动切换合照｜底部控音/启停轮播｜歌曲自动轮换</div>

<!-- 悬浮音效控制按钮组 -->
<div class="control-bar">
  <button class="control-btn" id="muteBtn">🔇 播放</button>
  <button class="control-btn" id="prevSong">⏮ 上一首</button>
  <button class="control-btn" id="nextSong">⏭ 下一首</button>
  <button class="control-btn active" id="autoPlayBtn">▶ 自动轮播</button>
</div>

<!-- 音乐修复优化：开启静音预加载、修复浏览器播放拦截、优化播放优先级 -->
<audio id="bgm1" preload="auto" muted>
  <source src="Chinesesong.mp3" type="audio/mpeg">
</audio>
<audio id="bgm2" preload="auto" muted>
  <source src="seeyouagain.mp3" type="audio/mpeg">
</audio>

<script>
// ===== 【已修复】音乐全套bug + 优化花瓣 + 原有功能全保留 =====
const photos = document.querySelectorAll('.photo-item');
const slideWrap = document.getElementById('slideWrap');
let index = 0;
let slideTimer = null;
let autoPlayStatus = true;

// =========1. 自动轮播（不变）=========
function autoSlide() {
  photos[index].classList.remove('active');
  index = (index + 1) % photos.length;
  photos[index].classList.add('active');
}
function startAuto() {
  slideTimer = setInterval(autoSlide, 4200);
  autoPlayStatus = true;
  document.getElementById('autoPlayBtn').classList.add('active');
}
function stopAuto() {
  clearInterval(slideTimer);
  autoPlayStatus = false;
  document.getElementById('autoPlayBtn').classList.remove('active');
}
startAuto();

// =========2. 触屏+鼠标滑动切图（不变）=========
let startX = 0, moveX = 0;
slideWrap.addEventListener('touchstart',e=>{ startX = e.touches[0].clientX; });
slideWrap.addEventListener('touchend',e=>{ moveX = e.changedTouches[0].clientX; slideJudge(); });
slideWrap.addEventListener('mousedown',e=>{ startX = e.clientX; slideWrap.onmousemove = ev=>moveX = ev.clientX; });
slideWrap.addEventListener('mouseup',()=>{ slideJudge(); slideWrap.onmousemove = null; });
function slideJudge(){
  const diff = startX - moveX;
  photos[index].classList.remove('active');
  if(diff > 40) index = (index + 1) % photos.length;
  if(diff < -40) index = (index - 1 + photos.length) % photos.length;
  photos[index].classList.add('active');
}

// =========3. 【重磅修复】音乐全部播放bug 彻底解决无声问题=========
const bgm1 = document.getElementById('bgm1');
const bgm2 = document.getElementById('bgm2');
const muteBtn = document.getElementById('muteBtn');
const prevSong = document.getElementById('prevSong');
const nextSong = document.getElementById('nextSong');
const autoPlayBtn = document.getElementById('autoPlayBtn');

// 默认打开页面：点击即可发声，修复旧代码静音逻辑错乱、切歌停止播放bug
let currentAudio = bgm1;
let isMute = true;
bgm1.loop = false;
bgm2.loop = false;
// 预加载音频，提前缓存，杜绝播放转圈
bgm1.load();bgm2.load();

// 全局任意点击页面，直接解锁声音，一键播放，无需多次点击（修复微信/浏览器拦截）
document.addEventListener('click',function(){
  if(isMute){
    isMute = false;
    currentAudio.muted = false;
    currentAudio.play().catch(e=>{});
    muteBtn.innerText = '🔊 静音';
  }
},{once:true});

// 修复歌曲结束自动切换失效bug，切换无缝衔接
function autoSwitchSong(){
  currentAudio.pause();
  currentAudio.currentTime = 0;
  currentAudio = currentAudio === bgm1 ? bgm2 : bgm1;
  if(!isMute) currentAudio.play().catch(e=>{});
}
bgm1.onended = autoSwitchSong;
bgm2.onended = autoSwitchSong;

// 修复静音按钮反向、点击无反应bug
muteBtn.onclick = function(e){
  e.stopPropagation();
  isMute = !isMute;
  currentAudio.muted = isMute;
  this.innerText = isMute ? '🔇 播放' : '🔊 静音';
  if(!isMute) currentAudio.play().catch(e=>{});
}

// 修复上下切歌停止播放、切歌卡顿bug
nextSong.onclick = function(e){ e.stopPropagation(); autoSwitchSong(); }
prevSong.onclick = function(e){
  e.stopPropagation();
  currentAudio.pause();
  currentAudio.currentTime = 0;
  currentAudio = currentAudio === bgm2 ? bgm1 : bgm2;
  if(!isMute) currentAudio.play().catch(e=>{});
}

// 启停轮播不变
autoPlayBtn.onclick = function(){
  autoPlayStatus ? stopAuto() : startAuto();
}

// =========4. 优化新版花瓣：形态仿真、飘落摇摆、疏密适中、超低性能消耗=========
function createPetal() {
  let petal = document.createElement('div');
  petal.classList.add('petal');
  // 花瓣大小随机，层次更自然
  let size = Math.random() * 8 + 4;
  let left = Math.random() * 100;
  // 飘落速度差异化，不呆板
  let duration = Math.random() * 9 + 6;
  petal.style.width = size + 'px';
  petal.style.height = size * 0.8 + 'px';
  petal.style.left = left + '%';
  petal.style.animationDuration = duration + 's';
  document.body.appendChild(petal);
  // 落地自动销毁，杜绝内存占用卡顿网页
  setTimeout(()=>{ petal.remove(); }, duration * 1000);
}
// 降低生成频率，花瓣疏密高级不杂乱，不抢占图片加载带宽
setInterval(createPetal, 420);
</script>
</body>
</html>
